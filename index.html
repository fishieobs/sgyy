<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#13100b">
<meta name="description" content="三國演義：天下歸一 —— 純網頁單機回合制策略遊戲，群雄逐鹿、問鼎中原。">
<title>三國演義：天下歸一</title>
<!-- App 圖示（iOS 須用 PNG，不支援 SVG 的 apple-touch-icon） -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-title" content="天下歸一">
<meta name="application-name" content="天下歸一">
<style>
/* =========================================================================
   三國演義：天下歸一  ——  style.css
   朱漆描金 · 竹簡羊皮 · 行動直式優先
   ========================================================================= */
:root{
  --ink:#1c1610; --ink2:#272019;
  --parch:#efe6cf; --parch2:#e2d3ad; --parch-line:#c9b487;
  --red:#9a2f22; --red-d:#6f1d14; --red-l:#c0432f;
  --gold:#c9a24c; --gold-b:#f0cf78; --gold-d:#8a6a2b;
  --gold-dd:#7a5d24;
  --jade:#3f7a5a; --jade-l:#5fa07a;
  --bg0:#13100b; --bg1:#1d1813;
  --shadow:0 8px 28px rgba(0,0,0,.5);
  --serif:"Noto Serif TC","Source Han Serif TC","Songti TC","Songti SC","SimSun",serif;
  --sans:-apple-system,"PingFang TC","PingFang SC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg0);
  font-family:var(--sans);color:#f3ead4;user-select:none;-webkit-user-select:none;}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit;}
img{display:block;}

#app{position:fixed;inset:0;}
#map{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}

/* ============== 頂部 HUD ============== */
#hud{position:absolute;top:0;left:0;right:0;z-index:30;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:calc(6px + var(--safe-t)) 10px 6px;
  background:linear-gradient(180deg,rgba(18,14,9,.96),rgba(18,14,9,.78) 70%,rgba(18,14,9,0));
}
.hud-left{display:flex;flex-direction:column;gap:2px;min-width:0;}
.hud-fac{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;
  font-family:var(--serif);font-weight:700;font-size:15px;letter-spacing:1px;
  padding:2px 10px;border:1px solid var(--gold);border-left:3px solid;border-radius:4px;
  background:rgba(0,0,0,.35);color:var(--gold-b);}
.hud-dot{width:9px;height:9px;border-radius:50%;display:inline-block;box-shadow:0 0 0 1px rgba(255,255,255,.35);}
.hud-turn{font-size:11.5px;color:#cdbf9c;padding-left:2px;}
.hud-res{display:flex;gap:5px;flex-wrap:wrap;flex:1;min-width:0;}
.res{font-size:12px;font-weight:600;padding:3px 8px;border-radius:20px;
  background:rgba(0,0,0,.4);border:1px solid rgba(201,162,76,.4);white-space:nowrap;}
.res.gold{color:#f0cf78;} .res.food{color:#bfe0a0;} .res.city{color:#e7c79a;} .res.troop{color:#e8a9a0;}
.hud-btns{display:flex;gap:6px;align-items:center;}
.hb{font-size:13px;font-weight:700;padding:7px 11px;border-radius:6px;min-height:36px;
  background:linear-gradient(180deg,#2c2218,#1c1610);border:1px solid var(--gold-d);color:var(--gold-b);}
.hb:active{transform:translateY(1px);}
.hb.end{background:linear-gradient(180deg,var(--red-l),var(--red-d));border-color:var(--gold);color:#fff;}

/* 階段提示 */
#phaseBadge{position:absolute;top:calc(58px + var(--safe-t));left:50%;transform:translateX(-50%) translateY(-8px);
  z-index:40;background:rgba(20,16,11,.9);border:1px solid var(--gold);color:var(--gold-b);
  font-family:var(--serif);font-size:14px;letter-spacing:2px;padding:6px 18px;border-radius:20px;
  opacity:0;pointer-events:none;transition:.25s;}
#phaseBadge.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ============== 事件記事條 ============== */
#logBar{position:absolute;left:8px;right:8px;bottom:calc(8px + var(--safe-b));z-index:25;
  display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;
  background:linear-gradient(180deg,rgba(30,24,18,.92),rgba(20,16,11,.92));
  border:1px solid rgba(201,162,76,.45);box-shadow:var(--shadow);}
.log-ico{font-size:14px;}
.log-txt{font-size:12.5px;color:#e6dcc2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ============== 城池面板（底部抽屜） ============== */
#citySheet{position:absolute;left:0;right:0;bottom:0;z-index:50;
  max-height:74%;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:10px 14px calc(18px + var(--safe-b));
  background:linear-gradient(180deg,#221b14,#191410);
  border-top:2px solid var(--gold);border-radius:16px 16px 0 0;
  box-shadow:0 -10px 30px rgba(0,0,0,.55);
  transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.8,.2,1);}
#citySheet.open{transform:translateY(0);}
.cs-head{display:flex;align-items:center;gap:10px;padding-bottom:8px;margin-bottom:8px;
  border-bottom:1px solid rgba(201,162,76,.3);border-left:4px solid var(--gold);padding-left:8px;}
.cs-title{font-family:var(--serif);font-size:21px;font-weight:700;color:var(--gold-b);letter-spacing:2px;}
.cs-owner{font-size:12px;color:#cdbf9c;display:flex;align-items:center;gap:5px;}
.cs-close{margin-left:auto;font-size:14px;font-weight:700;padding:6px 12px;border-radius:6px;
  background:#2c2218;border:1px solid var(--gold-d);color:var(--gold-b);min-height:34px;}
.cstats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.cstats>div{background:rgba(0,0,0,.3);border:1px solid rgba(201,162,76,.25);border-radius:6px;
  padding:6px 8px;font-size:14px;color:#f0e7cf;}
.cstats b{display:block;font-size:10.5px;color:#b6a884;font-weight:600;margin-bottom:1px;}
.cs-sub{font-family:var(--serif);font-size:13px;color:#d8b96a;margin:6px 0 5px;letter-spacing:1px;}
.genlist{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px;}
.genchip{display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.32);
  border:1px solid rgba(201,162,76,.3);border-radius:8px;padding:5px 8px 5px 5px;}
.genchip img{width:38px;height:38px;border-radius:5px;border:1px solid var(--gold-d);}
.gc-info{display:flex;flex-direction:column;}
.gc-name{font-size:13.5px;font-weight:700;color:#f3ead4;}
.gc-stat{font-size:10.5px;color:#b3a583;}
.gc-move{margin-left:2px;font-size:12px;padding:5px 9px;border-radius:5px;min-height:32px;
  background:#2c2218;border:1px solid var(--gold-d);color:var(--gold-b);}
.nogen{font-size:12px;color:#92866a;padding:4px 2px;}
.inj{color:#e8736a;font-size:11px;font-weight:700;}

/* 行動鈕 */
.acts{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:6px;}
.acts.one{grid-template-columns:1fr;}
.act{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  padding:9px 4px;border-radius:9px;min-height:52px;font-size:14px;font-weight:700;
  background:linear-gradient(180deg,#3a2c1d,#241b12);border:1px solid var(--gold-d);color:#f0d99a;letter-spacing:1px;}
.act:active{transform:translateY(1px);}
.act small{font-size:9.5px;font-weight:500;color:#a8966a;letter-spacing:0;}
.act.march{background:linear-gradient(180deg,var(--red-l),var(--red-d));border-color:var(--gold);color:#fff;grid-column:span 4;}
.act.march small{color:#f3d3c0;}
.acted{text-align:center;padding:12px;color:#9a8a6a;font-size:13px;
  background:rgba(0,0,0,.25);border-radius:8px;margin-top:6px;}
.enemy-hint{font-size:12.5px;color:#cdbf9c;background:rgba(0,0,0,.28);padding:9px 10px;border-radius:8px;margin-top:4px;}
.ceasefire{font-size:12.5px;color:var(--jade-l);margin-top:6px;text-align:center;}

/* ============== 子面板：募兵 / 出征 / 調動 ============== */
.dlg{padding:6px 2px 2px;}
.dlg-row{font-size:12.5px;color:#cdbf9c;margin:6px 0;}
.dlg-sub{font-family:var(--serif);font-size:13px;color:#d8b96a;margin:10px 0 6px;letter-spacing:1px;}
.dlg-big{text-align:center;font-size:15px;color:#cdbf9c;margin:8px 0;}
.dlg-big span{font-family:var(--serif);font-size:30px;font-weight:700;color:var(--gold-b);}
.dlg-go{width:100%;margin-top:12px;padding:13px;border-radius:9px;font-size:16px;font-weight:700;letter-spacing:3px;
  background:linear-gradient(180deg,var(--red-l),var(--red-d));border:1px solid var(--gold);color:#fff;}
.dlg-go:disabled{filter:grayscale(.7) brightness(.7);}
input[type=range]{width:100%;height:34px;-webkit-appearance:none;appearance:none;background:transparent;}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px;
  background:linear-gradient(90deg,var(--gold),var(--red-l));}
input[type=range]::-moz-range-track{height:6px;border-radius:3px;background:var(--gold);}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;margin-top:-9px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff,var(--gold-b) 40%,var(--gold-d));border:1px solid #5a4418;box-shadow:0 2px 4px rgba(0,0,0,.5);}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--gold-b);border:1px solid #5a4418;}

.tgts,.gsels,.mvdests{display:flex;flex-wrap:wrap;gap:7px;}
.tgt{flex:1 1 46%;display:flex;flex-direction:column;align-items:flex-start;gap:2px;
  padding:9px 11px;border-radius:9px;min-height:52px;
  background:rgba(0,0,0,.32);border:1px solid rgba(201,162,76,.35);}
.tgt b{font-family:var(--serif);font-size:15px;color:#f0e7cf;display:flex;align-items:center;gap:6px;}
.tgt small{font-size:10.5px;color:#b3a583;}
.tg-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.tgt.sel{border-color:var(--gold-b);background:rgba(201,162,76,.18);box-shadow:0 0 0 1px var(--gold);}
.tgt.dis{opacity:.45;}
.gsel{padding:8px 12px;border-radius:8px;min-height:42px;font-size:13.5px;font-weight:600;
  background:rgba(0,0,0,.3);border:1px solid rgba(201,162,76,.35);color:#ecdfbe;
  display:flex;flex-direction:column;align-items:center;gap:0;}
.gsel small{font-size:10px;color:#a8966a;}
.gsel.sel{border-color:var(--gold-b);background:rgba(201,162,76,.2);color:var(--gold-b);}
.mvdest{flex:1 1 30%;padding:10px;border-radius:8px;min-height:48px;font-size:14px;font-weight:600;
  background:rgba(0,0,0,.3);border:1px solid rgba(201,162,76,.35);color:#ecdfbe;
  display:flex;flex-direction:column;align-items:center;}
.mvdest small{font-size:10px;color:#a8966a;}

/* ============== 通用 Modal ============== */
#modalRoot{position:absolute;inset:0;z-index:70;display:none;}
#modalRoot.open{display:block;}
.modal-backdrop{position:absolute;inset:0;background:rgba(8,6,4,.66);backdrop-filter:blur(1px);}
.modal-box{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:min(92vw,440px);max-height:84vh;display:flex;flex-direction:column;
  background:linear-gradient(180deg,#241d15,#191410);border:1.5px solid var(--gold);
  border-radius:14px;box-shadow:var(--shadow);overflow:hidden;}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;background:linear-gradient(180deg,#3a2c1d,#2a2016);
  border-bottom:1px solid var(--gold-d);font-family:var(--serif);font-size:17px;
  font-weight:700;color:var(--gold-b);letter-spacing:2px;}
.modal-x{font-size:15px;padding:4px 10px;border-radius:6px;background:rgba(0,0,0,.3);
  border:1px solid var(--gold-d);color:var(--gold-b);min-height:32px;}
.modal-body{padding:12px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* 記事 modal */
.logwrap{display:flex;flex-direction:column;gap:5px;}
.logrow{font-size:12.5px;line-height:1.5;padding:6px 9px;border-radius:6px;background:rgba(0,0,0,.25);
  border-left:3px solid #5a4830;color:#e3d9bf;}
.lr-turn{color:#9a8a6a;font-size:10.5px;margin-right:6px;}
.lt-war,.lt-result{border-left-color:var(--red-l);} .lt-good{border-left-color:var(--jade-l);}
.lt-bad,.lt-warn{border-left-color:#c97a3a;} .lt-recruit{border-left-color:var(--gold-b);}
.lt-era{border-left-color:var(--gold);color:#f0cf78;}

/* 武將 modal */
.glistwrap,.flistwrap{display:flex;flex-direction:column;gap:7px;}
.grow{display:flex;align-items:center;gap:10px;padding:7px;border-radius:9px;
  background:rgba(0,0,0,.28);border:1px solid rgba(201,162,76,.25);}
.grow img{width:46px;height:46px;border-radius:6px;border:1px solid var(--gold-d);}
.gr-main{flex:1;min-width:0;}
.gr-name{font-family:var(--serif);font-size:15.5px;font-weight:700;color:#f3ead4;}
.gr-type{font-size:11px;color:#d8b96a;border:1px solid var(--gold-d);border-radius:4px;padding:0 4px;margin-left:2px;}
.gr-loc{font-size:11.5px;color:#b3a583;}
.gr-stats{font-size:11px;color:#cdbf9c;text-align:right;line-height:1.4;}
.gr-go{font-size:12.5px;padding:8px 12px;border-radius:6px;min-height:38px;
  background:#2c2218;border:1px solid var(--gold-d);color:var(--gold-b);}
.empty{text-align:center;color:#92866a;padding:20px;font-size:13px;}

/* 勢力 modal */
.frow{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:9px;
  background:rgba(0,0,0,.28);border:1px solid rgba(201,162,76,.22);}
.frow.me{background:rgba(201,162,76,.12);border-color:var(--gold);}
.fr-dot{width:14px;height:14px;border-radius:50%;box-shadow:0 0 0 1px rgba(255,255,255,.3);}
.fr-main{flex:1;min-width:0;}
.fr-name{font-family:var(--serif);font-size:15.5px;font-weight:700;color:#f3ead4;}
.fr-sub{font-size:11px;color:#b3a583;}
.fr-cf{font-size:11px;color:var(--jade-l);}
.fr-peace{font-size:12.5px;padding:8px 12px;border-radius:6px;min-height:38px;
  background:#2c2218;border:1px solid var(--gold-d);color:var(--gold-b);}

/* 選單 */
.menu{display:flex;flex-direction:column;gap:9px;}
.menu-b{padding:13px;border-radius:9px;font-size:15px;font-weight:700;letter-spacing:2px;
  background:linear-gradient(180deg,#3a2c1d,#241b12);border:1px solid var(--gold-d);color:#f0d99a;}
.menu-b:disabled{filter:grayscale(.7) brightness(.6);}
.menu-b.warn{background:linear-gradient(180deg,var(--red-l),var(--red-d));border-color:var(--gold);color:#fff;}

/* ============== Toast ============== */
#toast{position:absolute;left:50%;bottom:calc(74px + var(--safe-b));transform:translateX(-50%) translateY(10px);
  z-index:90;background:rgba(20,16,11,.95);border:1px solid var(--gold);color:#f0e7cf;
  font-size:13.5px;padding:9px 18px;border-radius:22px;opacity:0;pointer-events:none;
  transition:.25s;box-shadow:var(--shadow);max-width:80vw;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ============== 結局 ============== */
.end-box{text-align:center;padding:6px 4px;}
.end-title{font-family:var(--serif);font-size:30px;font-weight:700;letter-spacing:4px;margin-bottom:10px;}
.end-box.win .end-title{color:var(--gold-b);text-shadow:0 0 18px rgba(240,207,120,.5);}
.end-box.lose .end-title{color:#c98a7a;}
.end-sub{font-size:14px;color:#e3d9bf;line-height:1.7;margin-bottom:8px;}
.end-stat{font-size:13px;color:#b3a583;margin-bottom:16px;}
.end-go{width:100%;padding:13px;border-radius:9px;font-size:16px;font-weight:700;letter-spacing:3px;
  background:linear-gradient(180deg,#3a2c1d,#241b12);border:1px solid var(--gold);color:var(--gold-b);}

/* ============== 標題畫面 ============== */
#titleScreen{position:absolute;inset:0;z-index:100;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:
    radial-gradient(120% 80% at 50% -10%,rgba(154,47,34,.35),transparent 60%),
    radial-gradient(100% 60% at 50% 110%,rgba(201,162,76,.12),transparent 60%),
    linear-gradient(180deg,#1a140d,#0f0c08);}
#titleScreen.hidden{display:none;}
.title-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;padding:calc(30px + var(--safe-t)) 20px calc(30px + var(--safe-b));max-width:560px;margin:0 auto;}
.title-wrap.narrow{max-width:460px;justify-content:flex-start;}
.title-wrap.wide{max-width:720px;justify-content:flex-start;}
.title-banner{text-align:center;}
.title-main{font-family:var(--serif);font-size:54px;font-weight:900;letter-spacing:14px;
  color:var(--gold-b);text-shadow:0 2px 0 #5a4418,0 0 26px rgba(240,207,120,.35);margin-left:14px;}
.title-sub{font-family:var(--serif);font-size:30px;font-weight:700;letter-spacing:12px;color:#e8d6a6;margin:6px 0 0 12px;}
.title-tag{margin-top:12px;font-size:13px;letter-spacing:5px;color:#b9a878;}
.title-menu{display:flex;flex-direction:column;gap:12px;width:min(86vw,300px);}
.title-b{padding:15px;border-radius:11px;font-family:var(--serif);font-size:18px;font-weight:700;letter-spacing:4px;
  background:linear-gradient(180deg,#3a2c1d,#241b12);border:1px solid var(--gold-d);color:#f0d99a;}
.title-b:active{transform:translateY(1px);}
.title-b.primary{background:linear-gradient(180deg,var(--red-l),var(--red-d));border-color:var(--gold);color:#fff;
  box-shadow:0 6px 18px rgba(154,47,34,.4);}
.title-b.ghost{background:rgba(0,0,0,.25);}
.title-foot{font-size:11px;color:#867a5c;letter-spacing:1px;text-align:center;}

.help-title{font-family:var(--serif);font-size:24px;color:var(--gold-b);letter-spacing:3px;}
.help-body{font-size:13.5px;line-height:1.85;color:#e3d9bf;background:rgba(0,0,0,.25);
  border:1px solid rgba(201,162,76,.3);border-radius:10px;padding:14px 16px;}
.help-body p{margin:0 0 8px;} .help-body b{color:#f0cf78;}

.pick-head{display:flex;align-items:center;gap:12px;width:100%;justify-content:center;position:relative;
  font-family:var(--serif);font-size:20px;color:var(--gold-b);letter-spacing:3px;margin-bottom:6px;}
.pick-back{position:absolute;left:0;font-size:14px;padding:7px 12px;border-radius:7px;
  background:#2c2218;border:1px solid var(--gold-d);color:var(--gold-b);min-height:36px;}

.scen-list{display:flex;flex-direction:column;gap:14px;width:100%;}
.scen-card{text-align:left;padding:16px 18px;border-radius:13px;
  background:linear-gradient(160deg,#2a2016,#1c1610);border:1.5px solid var(--gold-d);}
.scen-card:active{transform:scale(.99);}
.scen-name{font-family:var(--serif);font-size:24px;font-weight:800;color:var(--gold-b);letter-spacing:3px;}
.scen-year{font-size:12.5px;color:#cdbf9c;margin:3px 0 8px;}
.scen-intro{font-size:13px;line-height:1.7;color:#ddd2b6;}
.scen-meta{margin-top:9px;font-size:12px;color:#b9a878;border-top:1px solid rgba(201,162,76,.25);padding-top:7px;}

.fac-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;width:100%;}
.fac-card{position:relative;text-align:center;padding:12px 10px 13px;border-radius:12px;overflow:hidden;
  background:linear-gradient(170deg,#2a2016,#191410);border:1.5px solid var(--gold-d);
  border-top:4px solid var(--fc,var(--gold));}
.fac-card:active{transform:scale(.98);}
.fac-port{width:60px;height:60px;margin:0 auto 7px;border-radius:8px;border:2px solid var(--fc,var(--gold));

.fac-name{font-family:var(--serif);font-size:19px;font-weight:800;color:#f3ead4;letter-spacing:2px;}
.fac-leader{font-size:11.5px;color:#cdbf9c;margin-top:2px;}
.fac-diff{display:inline-block;margin:5px 0;font-size:11px;color:var(--gold-b);
  border:1px solid var(--gold-d);border-radius:12px;padding:1px 10px;}
.fac-meta{font-size:11.5px;color:#b9a878;}
.fac-desc{font-size:11px;line-height:1.55;color:#bcae8a;margin-top:6px;
  border-top:1px solid rgba(201,162,76,.2);padding-top:6px;min-height:48px;}

/* ============== 戰鬥 ============== */
#battleOverlay{position:absolute;inset:0;z-index:80;display:none;flex-direction:column;
  padding:calc(10px + var(--safe-t)) 12px calc(12px + var(--safe-b));
  background:
    radial-gradient(120% 70% at 50% 0%,rgba(154,47,34,.4),transparent 60%),
    linear-gradient(180deg,#241712,#120d09 70%);}
#battleOverlay.show{display:flex;}
#battleTitle{text-align:center;font-family:var(--serif);font-size:19px;font-weight:700;
  color:var(--gold-b);letter-spacing:3px;padding:6px 0 10px;}
#battleStage{display:flex;align-items:stretch;gap:8px;justify-content:center;}
.bt-side{flex:1;max-width:44%;display:flex;flex-direction:column;align-items:center;gap:5px;
  background:rgba(0,0,0,.3);border:1px solid rgba(201,162,76,.3);border-radius:12px;padding:10px 8px;}
.bt-side.foe{border-color:rgba(192,67,47,.5);}
.bt-banner{font-family:var(--serif);font-size:15px;font-weight:700;color:#fff;letter-spacing:1px;
  padding:3px 12px;border-radius:5px;box-shadow:0 1px 4px rgba(0,0,0,.4);}
.bt-port{width:84px;height:84px;border-radius:9px;border:2px solid var(--gold-d);object-fit:cover;}
.bt-port.noport{display:flex;align-items:center;justify-content:center;font-size:12px;color:#90835f;
  background:rgba(0,0,0,.3);}
.bt-troops{font-family:var(--serif);font-size:21px;font-weight:800;color:#f3ead4;}
.bt-bar{width:100%;height:9px;border-radius:5px;background:rgba(0,0,0,.45);overflow:hidden;border:1px solid rgba(0,0,0,.4);}
.bt-bar.small{height:6px;}
.bt-bar-fill{height:100%;width:100%;transition:width .5s ease;}
.troopfill{background:linear-gradient(90deg,#c0432f,#e08a5a);}
.morfill{background:linear-gradient(90deg,#3f7a5a,#8fcf8a);}
.bt-morale{font-size:11px;color:#cdbf9c;}
.bt-vs{align-self:center;font-size:30px;color:var(--gold-b);filter:drop-shadow(0 0 6px rgba(240,207,120,.5));}
.bt-vs.clash{animation:clash .4s ease;}
@keyframes clash{0%{transform:scale(1) rotate(0);}40%{transform:scale(1.6) rotate(-12deg);}100%{transform:scale(1) rotate(0);}}
.shake{animation:shake .32s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}}

/* 單挑彈窗 */
#duelBox{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%) scale(.85);
  width:min(88vw,400px);z-index:85;opacity:0;pointer-events:none;transition:.25s;
  background:linear-gradient(180deg,#2a1b14,#180f0a);border:2px solid var(--gold);border-radius:14px;
  padding:14px 16px;box-shadow:var(--shadow);}
#duelBox.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.duel-title{text-align:center;font-family:var(--serif);font-size:20px;color:#e8736a;letter-spacing:4px;margin-bottom:10px;}
.duel-ex{font-size:13px;color:#e3d9bf;line-height:1.7;padding:2px 0;border-bottom:1px dashed rgba(201,162,76,.2);}
.duel-verdict{text-align:center;font-family:var(--serif);font-size:16px;font-weight:700;color:var(--gold-b);margin-top:10px;}

#battleLog{flex:1;min-height:60px;margin:10px 0;overflow-y:auto;-webkit-overflow-scrolling:touch;

.bl-duel{color:#f0cf78;} .bl-crit{color:#fff;font-weight:700;} .bl-rout{color:#c98a7a;}

/* 操作鈕列 */
#battleControls{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.bt-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px;border-radius:9px;
  min-height:54px;background:linear-gradient(180deg,#3a2c1d,#241b12);border:1px solid var(--gold-d);color:#f0d99a;}
.bt-btn:active{transform:translateY(1px);}
.bt-btn:disabled{filter:grayscale(.7) brightness(.55);}
.bt-bk{font-family:var(--serif);font-size:16px;font-weight:700;letter-spacing:2px;}
.bt-bd{font-size:9.5px;color:#a8966a;}
.bt-btn.warn{background:linear-gradient(180deg,#5a3a2a,#3a221a);border-color:#c97a3a;color:#f0c09a;}
.bt-btn.auto{background:linear-gradient(180deg,#2a3a32,#18241f);border-color:var(--jade);color:#9fd0b0;}

#captiveModal,#battleResult{position:absolute;inset:0;z-index:88;display:none;align-items:center;justify-content:center;
  background:rgba(8,6,4,.72);padding:20px;}
#captiveModal.show,#battleResult.show{display:flex;}

.cap-head{font-family:var(--serif);font-size:16px;color:#d8b96a;letter-spacing:2px;margin-bottom:10px;}
.cap-port{width:104px;height:104px;margin:0 auto 8px;border-radius:10px;border:2px solid var(--gold-d);}
.cap-name{font-family:var(--serif);font-size:22px;font-weight:800;color:#f3ead4;}
.cap-type{font-size:12px;color:#d8b96a;border:1px solid var(--gold-d);border-radius:4px;padding:0 5px;}
.cap-stats{font-size:12px;color:#cdbf9c;margin:7px 0;}
.cap-chance{font-size:13px;color:var(--gold-b);margin-bottom:12px;}
.cap-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cap-b{padding:12px 4px;border-radius:9px;font-family:var(--serif);font-size:15px;font-weight:700;letter-spacing:1px;
  border:1px solid var(--gold-d);}
.cap-b.recruit{background:linear-gradient(180deg,var(--jade),#2a5a42);color:#eafff0;border-color:var(--jade-l);}
.cap-b.release{background:linear-gradient(180deg,#3a2c1d,#241b12);color:#f0d99a;}
.cap-b.behead{background:linear-gradient(180deg,var(--red-l),var(--red-d));color:#fff;border-color:var(--gold-d);}

.br-title{font-family:var(--serif);font-size:30px;font-weight:800;letter-spacing:4px;margin-bottom:8px;}
.br-title.win{color:var(--gold-b);text-shadow:0 0 16px rgba(240,207,120,.5);}
.br-title.lose{color:#c98a7a;}
.br-city{font-family:var(--serif);font-size:16px;color:#e3d9bf;margin-bottom:12px;}
.br-rows{display:flex;flex-direction:column;gap:5px;font-size:14px;color:#ddd2b6;margin-bottom:16px;}

@media (max-width:380px){

  .acts{grid-template-columns:repeat(3,1fr);}

  .cstats{grid-template-columns:repeat(3,1fr);}
}
@media (min-width:560px){
  .fac-grid{grid-template-columns:repeat(3,1fr);}
}

/* =========================================================================
   音效引擎 audio.js  ——  全程式生成，無外部檔案
   五聲音階古箏風背景樂 + 戰鼓 / 刀劍 / 鑼 / 火計 / 勝敗 等音效
   ========================================================================= */


var AUD = {
  ctx: null,
  master: null,
  musicGain: null,
  sfxGain: null,
  musicOn: true,
  sfxOn: true,
  _musicTimer: null,
  _step: 0,
  _mode: "field"   // field（地圖） / battle（戰場）
};

AUD.init = function () {
  if (AUD.ctx) return;
  try {
    var AC = window.AudioContext || window.webkitAudioContext;
    AUD.ctx = new AC();
    AUD.master = AUD.ctx.createGain();
    AUD.master.gain.value = 0.9;
    AUD.master.connect(AUD.ctx.destination);

    AUD.musicGain = AUD.ctx.createGain();
    AUD.musicGain.gain.value = 0.32;
    AUD.musicGain.connect(AUD.master);

    AUD.sfxGain = AUD.ctx.createGain();
    AUD.sfxGain.gain.value = 0.85;
    AUD.sfxGain.connect(AUD.master);
  } catch (e) {
    AUD.ctx = null;
  }
};

AUD.resume = function () {
  if (AUD.ctx && AUD.ctx.state === "suspended") AUD.ctx.resume();
};

// 五聲音階（宮商角徵羽），以頻率表示，跨兩個八度
AUD.scale = (function () {
  var base = [261.63, 293.66, 329.63, 392.00, 440.00]; // C D E G A
  var arr = [];
  var i;
  for (i = 0; i < base.length; i++) arr.push(base[i] / 2);   // 低八度
  for (i = 0; i < base.length; i++) arr.push(base[i]);       // 中八度
  for (i = 0; i < base.length; i++) arr.push(base[i] * 2);   // 高八度
  return arr;
})();

// 撥弦音（古箏／琵琶感）：三角波 + 快速衰減
AUD._pluck = function (freq, time, dur, gain) {
  if (!AUD.ctx) return;
  var o = AUD.ctx.createOscillator();
  var g = AUD.ctx.createGain();
  o.type = "triangle";
  o.frequency.value = freq;
  // 加一點泛音
  var o2 = AUD.ctx.createOscillator();
  o2.type = "sine";
  o2.frequency.value = freq * 2.01;
  var g2 = AUD.ctx.createGain();
  g2.gain.value = 0.0;
  o2.connect(g2); g2.connect(AUD.musicGain);

  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(gain, time + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0008, time + dur);
  g2.gain.setValueAtTime(gain * 0.25, time);
  g2.gain.exponentialRampToValueAtTime(0.0006, time + dur * 0.6);

  o.connect(g); g.connect(AUD.musicGain);
  o.start(time); o.stop(time + dur + 0.05);
  o2.start(time); o2.stop(time + dur + 0.05);
};

// 低音（笙／鼓點墊底）
AUD._bass = function (freq, time, dur, gain) {
  if (!AUD.ctx) return;
  var o = AUD.ctx.createOscillator();
  var g = AUD.ctx.createGain();
  o.type = "sine";
  o.frequency.value = freq;
  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(gain, time + 0.04);
  g.gain.exponentialRampToValueAtTime(0.0006, time + dur);
  o.connect(g); g.connect(AUD.musicGain);
  o.start(time); o.stop(time + dur + 0.05);
};

// 背景樂步進（每拍呼叫一次）
AUD._musicStep = function () {
  if (!AUD.ctx || !AUD.musicOn) return;
  var t = AUD.ctx.currentTime + 0.05;
  var sc = AUD.scale;
  var step = AUD._step;

  if (AUD._mode === "field") {
    // 悠遠的山河旋律：每兩拍一個主音 + 偶爾的點綴
    var beat = 0.62;
    var idxSeq = [7, 9, 8, 6, 7, 5, 8, 9, 12, 11, 9, 8, 7, 6, 5, 7];
    var note = sc[idxSeq[step % idxSeq.length] % sc.length] || sc[7];
    AUD._pluck(note, t, 1.1, 0.5);
    if (step % 2 === 0) {
      AUD._pluck(sc[(idxSeq[step % idxSeq.length] + 2) % sc.length], t + beat * 0.5, 0.7, 0.28);
    }
    if (step % 4 === 0) {
      AUD._bass(sc[(step % 2 === 0) ? 0 : 3], t, 1.6, 0.4);
    }
    AUD._musicTimer = setTimeout(AUD._musicStep, beat * 1000);
  } else {
    // 戰場：急促鼓點 + 緊張低音
    var bbeat = 0.34;
    AUD._drum(t, step % 2 === 0 ? 0.55 : 0.32);
    if (step % 4 === 0) AUD._bass(sc[0], t, 0.5, 0.5);
    if (step % 8 === 4) {
      var n = sc[[5, 6, 7, 8][(step / 8) % 4 | 0] % sc.length];
      AUD._pluck(n, t, 0.5, 0.3);
    }
    AUD._musicTimer = setTimeout(AUD._musicStep, bbeat * 1000);
  }
  AUD._step++;
};

AUD.startMusic = function (mode) {
  if (!AUD.ctx) return;
  AUD._mode = mode || "field";
  if (AUD._musicTimer) { clearTimeout(AUD._musicTimer); AUD._musicTimer = null; }
  AUD._step = 0;
  if (AUD.musicOn) AUD._musicStep();
};

AUD.setMode = function (mode) {
  if (AUD._mode === mode) return;
  AUD.startMusic(mode);
};

AUD.stopMusic = function () {
  if (AUD._musicTimer) { clearTimeout(AUD._musicTimer); AUD._musicTimer = null; }
};

AUD.toggleMusic = function () {
  AUD.musicOn = !AUD.musicOn;
  if (AUD.musicOn) AUD.startMusic(AUD._mode);
  else AUD.stopMusic();
  return AUD.musicOn;
};

AUD.toggleSfx = function () {
  AUD.sfxOn = !AUD.sfxOn;
  return AUD.sfxOn;
};

/* ----------------- 音效 ----------------- */
AUD._noise = function (dur) {
  var n = Math.floor(AUD.ctx.sampleRate * dur);
  var buf = AUD.ctx.createBuffer(1, n, AUD.ctx.sampleRate);
  var d = buf.getChannelData(0);
  for (var i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  var src = AUD.ctx.createBufferSource();
  src.buffer = buf;
  return src;
};

// 戰鼓
AUD._drum = function (time, gain) {
  if (!AUD.ctx) return;
  var o = AUD.ctx.createOscillator();
  var g = AUD.ctx.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(160, time);
  o.frequency.exponentialRampToValueAtTime(55, time + 0.18);
  g.gain.setValueAtTime(gain, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
  o.connect(g); g.connect(AUD.sfxOn ? AUD.sfxGain : AUD.musicGain);
  o.start(time); o.stop(time + 0.32);
};

AUD.play = function (name) {
  if (!AUD.ctx || !AUD.sfxOn) return;

  var t = AUD.ctx.currentTime + 0.01;

  switch (name) {
    case "click":
      o = AUD.ctx.createOscillator(); g = AUD.ctx.createGain();
      o.type = "square"; o.frequency.setValueAtTime(660, t);
      o.frequency.exponentialRampToValueAtTime(880, t + 0.04);
      g.gain.setValueAtTime(0.18, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      o.connect(g); g.connect(AUD.sfxGain); o.start(t); o.stop(t + 0.1);
      break;

    case "select":
      o = AUD.ctx.createOscillator(); g = AUD.ctx.createGain();
      o.type = "sine"; o.frequency.setValueAtTime(523, t);
      o.frequency.exponentialRampToValueAtTime(784, t + 0.1);
      g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      o.connect(g); g.connect(AUD.sfxGain); o.start(t); o.stop(t + 0.2);

      src = AUD._noise(0.18); filt = AUD.ctx.createBiquadFilter(); g = AUD.ctx.createGain();

      g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
      src.connect(filt); filt.connect(g); g.connect(AUD.sfxGain); src.start(t); src.stop(t + 0.18);
      o = AUD.ctx.createOscillator(); var g2 = AUD.ctx.createGain();
      o.type = "triangle"; o.frequency.setValueAtTime(1800, t); o.frequency.exponentialRampToValueAtTime(700, t + 0.12);

      break;

    case "coin": // 募兵 / 金錢
      for (var k = 0; k < 3; k++) {
        o = AUD.ctx.createOscillator(); g = AUD.ctx.createGain();
        o.type = "square"; o.frequency.setValueAtTime(900 + k * 180, t + k * 0.05);
        g.gain.setValueAtTime(0.12, t + k * 0.05); g.gain.exponentialRampToValueAtTime(0.001, t + k * 0.05 + 0.1);
        o.connect(g); g.connect(AUD.sfxGain); o.start(t + k * 0.05); o.stop(t + k * 0.05 + 0.11);
      }
      break;

    case "recruit": // 名將來投
      AUD._fanfare(t, [523, 659, 784, 1046], 0.13);
      break;
  }
};

AUD._fanfare = function (t, freqs, step, soft) {
  for (var i = 0; i < freqs.length; i++) {
    var o = AUD.ctx.createOscillator();
    var g = AUD.ctx.createGain();
    o.type = soft ? "sine" : "triangle";
    o.frequency.value = freqs[i];
    var st = t + i * step;
    g.gain.setValueAtTime(0, st);
    g.gain.linearRampToValueAtTime(soft ? 0.22 : 0.3, st + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, st + 0.5);
    o.connect(g); g.connect(AUD.sfxGain);
    o.start(st); o.stop(st + 0.55);
  }
};

/* ===== portrait.js ===== */
/* =========================================================================
   武將肖像 portrait.js  ——  依名字種子與屬性程式生成風格化頭像
   ========================================================================= */


var PORTRAIT = {};

// 字串雜湊 -> 種子亂數
PORTRAIT._seed = function (str) {
  var h = 2166136261;
  for (var i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return (h >>> 0);
};
PORTRAIT._rng = function (seed) {
  var s = seed >>> 0;
  return function () {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    return s / 4294967296;
  };
};

PORTRAIT._lighten = function (hex, amt) {
  var c = hex.replace("#", "");
  var r = parseInt(c.substr(0, 2), 16), g = parseInt(c.substr(2, 2), 16), b = parseInt(c.substr(4, 2), 16);
  r = Math.min(255, Math.round(r + (255 - r) * amt));
  g = Math.min(255, Math.round(g + (255 - g) * amt));
  b = Math.min(255, Math.round(b + (255 - b) * amt));
  return "rgb(" + r + "," + g + "," + b + ")";
};
PORTRAIT._darken = function (hex, amt) {
  var c = hex.replace("#", "");
  var r = parseInt(c.substr(0, 2), 16), g = parseInt(c.substr(2, 2), 16), b = parseInt(c.substr(4, 2), 16);
  r = Math.round(r * (1 - amt)); g = Math.round(g * (1 - amt)); b = Math.round(b * (1 - amt));
  return "rgb(" + r + "," + g + "," + b + ")";
};

/* 在 ctx 的 (0,0)-(size,size) 範圍內畫一張頭像
   gen: 武將資料物件 {n, s, t}
   factionColor: 勢力色（用於甲冑）                                          */
PORTRAIT.draw = function (ctx, gen, size, factionColor) {
  var rng = PORTRAIT._rng(PORTRAIT._seed(gen.n));
  var S = size;
  var lead = gen.s[0], war = gen.s[1], intel = gen.s[2], cha = gen.s[4];
  var isScholar = (gen.t === "士") || (intel >= 88 && war < 70);
  var isRuler = (gen.t === "君");
  var fc = factionColor || "#7a5230";

  ctx.save();
  ctx.clearRect(0, 0, S, S);

  // 背景
  var bg = ctx.createLinearGradient(0, 0, 0, S);
  bg.addColorStop(0, "#3a2f26");
  bg.addColorStop(1, "#211a14");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, S, S);

  var cx = S * 0.5;
  var skinTones = ["#e8c2a0", "#dcae8a", "#e6c8a6", "#d2a074", "#caa580"];
  var skin = skinTones[Math.floor(rng() * skinTones.length)];

  // —— 肩甲 ——
  ctx.fillStyle = PORTRAIT._darken(fc, 0.15);
  ctx.beginPath();
  ctx.moveTo(S * 0.08, S);
  ctx.quadraticCurveTo(S * 0.18, S * 0.74, S * 0.30, S * 0.70);
  ctx.lineTo(S * 0.70, S * 0.70);
  ctx.quadraticCurveTo(S * 0.82, S * 0.74, S * 0.92, S);
  ctx.closePath();
  ctx.fill();
  // 甲片高光
  ctx.strokeStyle = PORTRAIT._lighten(fc, 0.25);
  ctx.lineWidth = Math.max(1, S * 0.012);
  ctx.beginPath();
  ctx.moveTo(S * 0.30, S * 0.80); ctx.lineTo(S * 0.70, S * 0.80);
  ctx.moveTo(S * 0.34, S * 0.90); ctx.lineTo(S * 0.66, S * 0.90);
  ctx.stroke();
  // 領巾
  ctx.fillStyle = isScholar ? "#e7e0cf" : PORTRAIT._lighten(fc, 0.4);
  ctx.beginPath();
  ctx.moveTo(S * 0.40, S * 0.70);
  ctx.lineTo(cx, S * 0.86);
  ctx.lineTo(S * 0.60, S * 0.70);
  ctx.closePath();
  ctx.fill();

  // —— 脖子 ——
  ctx.fillStyle = PORTRAIT._darken(skin, 0.12);
  ctx.fillRect(cx - S * 0.09, S * 0.58, S * 0.18, S * 0.16);

  // —— 臉 ——
  var faceW = S * 0.30, faceH = S * 0.34;
  var faceY = S * 0.42;
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.ellipse(cx, faceY, faceW, faceH, 0, 0, Math.PI * 2);
  ctx.fill();
  // 臉部陰影
  ctx.fillStyle = "rgba(0,0,0,0.06)";
  ctx.beginPath();
  ctx.ellipse(cx + faceW * 0.35, faceY, faceW * 0.5, faceH, 0, 0, Math.PI * 2);
  ctx.fill();

  // —— 眉 ——（武將濃眉上揚、文士平緩）
  var browY = faceY - faceH * 0.18;
  var browW = faceW * 0.42;
  var fierce = (war - 60) / 50;             // 兇悍度
  ctx.strokeStyle = "#2b211a";
  ctx.lineWidth = Math.max(1.5, S * (isScholar ? 0.012 : 0.022));
  ctx.lineCap = "round";
  // 左眉
  ctx.beginPath();
  ctx.moveTo(cx - faceW * 0.50, browY + (isScholar ? 0 : fierce * S * 0.02));
  ctx.lineTo(cx - faceW * 0.10, browY - (isScholar ? 0 : fierce * S * 0.03));
  ctx.stroke();
  // 右眉
  ctx.beginPath();
  ctx.moveTo(cx + faceW * 0.10, browY - (isScholar ? 0 : fierce * S * 0.03));
  ctx.lineTo(cx + faceW * 0.50, browY + (isScholar ? 0 : fierce * S * 0.02));
  ctx.stroke();

  // —— 眼 ——
  var eyeY = faceY - faceH * 0.02;
  var eyeDX = faceW * 0.32;
  ctx.fillStyle = "#fff";
  var ew = faceW * 0.20, eh = faceH * 0.12;
  ctx.beginPath(); ctx.ellipse(cx - eyeDX, eyeY, ew, eh, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + eyeDX, eyeY, ew, eh, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#1a1410";
  var pupil = eh * 0.85;
  ctx.beginPath(); ctx.arc(cx - eyeDX + ew * 0.1, eyeY, pupil, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + eyeDX - ew * 0.1, eyeY, pupil, 0, Math.PI * 2); ctx.fill();

  // —— 鼻 ——
  ctx.strokeStyle = PORTRAIT._darken(skin, 0.22);
  ctx.lineWidth = Math.max(1, S * 0.012);
  ctx.beginPath();
  ctx.moveTo(cx - faceW * 0.04, faceY + faceH * 0.06);
  ctx.lineTo(cx - faceW * 0.10, faceY + faceH * 0.30);
  ctx.lineTo(cx + faceW * 0.04, faceY + faceH * 0.30);
  ctx.stroke();

  // —— 嘴 ——
  ctx.strokeStyle = "#7a3b34";
  ctx.lineWidth = Math.max(1.5, S * 0.016);
  ctx.beginPath();
  ctx.moveTo(cx - faceW * 0.18, faceY + faceH * 0.52);
  ctx.quadraticCurveTo(cx, faceY + faceH * (war > 85 ? 0.46 : 0.58), cx + faceW * 0.18, faceY + faceH * 0.52);
  ctx.stroke();

  // —— 鬍鬚 ——（魅力高或年長者長鬚；隨種子變化）
  var beardStyle = Math.floor(rng() * 4);  // 0無 1八字 2絡腮 3長鬚
  var longBeard = (cha >= 90 || gen.n === "關羽" || gen.n === "黃忠" || gen.n === "劉備" || gen.n === "孫堅");
  if (gen.n === "關羽") beardStyle = 3;
  if (isScholar && beardStyle === 2) beardStyle = 1;
  if (beardStyle >= 1) {
    ctx.fillStyle = (gen.n === "黃忠" || cha >= 95) ? "#5a5048" : "#241c15";
    if (gen.n === "黃忠") ctx.fillStyle = "#b9b0a4";
    if (beardStyle === 1) { // 八字鬍
      ctx.beginPath();
      ctx.moveTo(cx - faceW * 0.20, faceY + faceH * 0.46);
      ctx.quadraticCurveTo(cx - faceW * 0.30, faceY + faceH * 0.60, cx - faceW * 0.16, faceY + faceH * 0.66);
      ctx.lineTo(cx - faceW * 0.06, faceY + faceH * 0.50);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + faceW * 0.20, faceY + faceH * 0.46);
      ctx.quadraticCurveTo(cx + faceW * 0.30, faceY + faceH * 0.60, cx + faceW * 0.16, faceY + faceH * 0.66);
      ctx.lineTo(cx + faceW * 0.06, faceY + faceH * 0.50);
      ctx.fill();
    } else if (beardStyle === 2) { // 絡腮鬍
      ctx.beginPath();
      ctx.moveTo(cx - faceW * 0.95, faceY + faceH * 0.2);
      ctx.quadraticCurveTo(cx, faceY + faceH * 1.25, cx + faceW * 0.95, faceY + faceH * 0.2);
      ctx.quadraticCurveTo(cx + faceW * 0.6, faceY + faceH * 0.55, cx, faceY + faceH * 0.62);
      ctx.quadraticCurveTo(cx - faceW * 0.6, faceY + faceH * 0.55, cx - faceW * 0.95, faceY + faceH * 0.2);
      ctx.fill();
    }
    if (beardStyle === 3 || longBeard) { // 長鬚
      ctx.beginPath();
      ctx.moveTo(cx - faceW * 0.30, faceY + faceH * 0.55);
      ctx.quadraticCurveTo(cx - faceW * 0.25, faceY + faceH * 1.6, cx, faceY + faceH * 1.85);
      ctx.quadraticCurveTo(cx + faceW * 0.25, faceY + faceH * 1.6, cx + faceW * 0.30, faceY + faceH * 0.55);
      ctx.quadraticCurveTo(cx, faceY + faceH * 0.9, cx - faceW * 0.30, faceY + faceH * 0.55);
      ctx.fill();
    }
  }

  // —— 頭冠 / 頭盔 ——
  if (isScholar) {
    // 綸巾 / 文士冠
    ctx.fillStyle = "#dfd8c6";
    ctx.beginPath();
    ctx.moveTo(cx - faceW * 1.05, faceY - faceH * 0.45);
    ctx.quadraticCurveTo(cx, faceY - faceH * 1.15, cx + faceW * 1.05, faceY - faceH * 0.45);
    ctx.lineTo(cx + faceW * 0.95, faceY - faceH * 0.30);
    ctx.quadraticCurveTo(cx, faceY - faceH * 0.62, cx - faceW * 0.95, faceY - faceH * 0.30);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#c8bfa8";
    ctx.fillRect(cx - faceW * 0.18, faceY - faceH * 1.0, faceW * 0.36, faceH * 0.34);
    ctx.strokeStyle = "#a89b7e"; ctx.lineWidth = Math.max(1, S * 0.01);
    ctx.strokeRect(cx - faceW * 0.18, faceY - faceH * 1.0, faceW * 0.36, faceH * 0.34);
  } else {
    // 頭盔
    var helmColor = isRuler ? "#caa84a" : PORTRAIT._lighten(fc, 0.1);
    ctx.fillStyle = helmColor;
    ctx.beginPath();
    ctx.moveTo(cx - faceW * 1.08, faceY - faceH * 0.10);
    ctx.quadraticCurveTo(cx - faceW * 1.0, faceY - faceH * 1.25, cx, faceY - faceH * 1.35);
    ctx.quadraticCurveTo(cx + faceW * 1.0, faceY - faceH * 1.25, cx + faceW * 1.08, faceY - faceH * 0.10);
    ctx.quadraticCurveTo(cx, faceY - faceH * 0.55, cx - faceW * 1.08, faceY - faceH * 0.10);
    ctx.closePath();
    ctx.fill();
    // 盔頂與纓
    ctx.fillStyle = PORTRAIT._darken(helmColor, 0.2);
    ctx.fillRect(cx - faceW * 0.10, faceY - faceH * 1.75, faceW * 0.20, faceH * 0.5);
    var plume = isRuler ? "#d4af37" : "#b03030";
    ctx.fillStyle = plume;
    ctx.beginPath();
    ctx.moveTo(cx, faceY - faceH * 1.7);
    ctx.quadraticCurveTo(cx - faceW * 0.5, faceY - faceH * 2.4, cx - faceW * 0.05, faceY - faceH * 2.45);
    ctx.quadraticCurveTo(cx + faceW * 0.2, faceY - faceH * 2.0, cx, faceY - faceH * 1.7);
    ctx.fill();
    // 盔沿高光
    ctx.strokeStyle = PORTRAIT._lighten(helmColor, 0.35);
    ctx.lineWidth = Math.max(1.5, S * 0.018);
    ctx.beginPath();
    ctx.moveTo(cx - faceW * 1.05, faceY - faceH * 0.12);
    ctx.quadraticCurveTo(cx, faceY - faceH * 0.5, cx + faceW * 1.05, faceY - faceH * 0.12);
    ctx.stroke();
  }

  ctx.restore();
};

/* 把肖像渲染成 dataURL（離屏 canvas），給 <img> 用 */
PORTRAIT.toDataURL = function (gen, size, factionColor) {
  var cv = document.createElement("canvas");
  cv.width = size; cv.height = size;
  var ctx = cv.getContext("2d");
  PORTRAIT.draw(ctx, gen, size, factionColor);
  return cv.toDataURL("image/png");
};

/* ===== core.js ===== */
/* =========================================================================
   三國演義：天下歸一  ——  核心層 core.js
   全域遊戲狀態 S、工具函式 U、以及各種存取輔助
   ========================================================================= */


/* ---------------- 工具函式 ---------------- */
var U = {
  clamp: function (v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); },
  rnd: function (a, b) { return a + Math.random() * (b - a); },         // 浮點 [a,b)
  irnd: function (a, b) { return Math.floor(a + Math.random() * (b - a + 1)); }, // 整數 [a,b]
  pick: function (arr) { return arr[Math.floor(Math.random() * arr.length)]; },
  chance: function (p) { return Math.random() < p; },
  fmt: function (n) { n = Math.round(n); return n.toLocaleString("en-US"); },
  wan: function (n) {
    n = Math.round(n);
    if (n >= 10000) return (n / 10000).toFixed(n % 10000 === 0 ? 0 : 1) + "萬";
    return "" + n;
  },
  // 季節名
  seasonName: function (s) { return ["春", "夏", "秋", "冬"][s % 4]; }
};

/* ---------------- 全域狀態 ---------------- */
var S = {
  scenKey: null,
  scen: null,
  turn: 1,
  season: 0,
  playerFaction: null,
  playerDiff: 0,     // 玩家開局難度 tier：0 易 / 1 普通 / 2 困難（決定加成幅度）
  factions: {},      // fid -> {id,name,color,leaderId,gold,food,alive,isPlayer,ceasefire:{},aiTrait}
  cityOwner: {},     // cityId -> fid | null
  cityState: {},     // cityId -> {troops,def,com,agr,pop,acted}
  generals: {},      // genId -> {loc,faction,status,injuredTurns}
  wildPool: [],      // [{id,near,minTurn,discovered}]
  log: [],           // [{turn,text,type}]
  selectedCity: null,
  over: false,
  outcome: null,     // "win" | "lose"
  difficultyTip: ""
};

/* ---------------- 存取輔助 ---------------- */
var Q = {
  ownerOf: function (cid) { return S.cityOwner[cid]; },
  cs: function (cid) { return S.cityState[cid]; },
  troopsOf: function (cid) { var c = S.cityState[cid]; return c ? c.troops : 0; },
  gen: function (gid) { return GEN[gid]; },                 // 靜態資料
  gstate: function (gid) { return S.generals[gid]; },       // 動態狀態
  cityName: function (cid) { return CITY[cid] ? CITY[cid].n : cid; },
  factionOf: function (fid) { return S.factions[fid]; },
  // 公元紀年：一回合為一季，四季（四回合）為一年
  gameYear: function (turn) {
    var y0 = (S.scen && S.scen.y0) || 190;
    return y0 + Math.floor(((turn || S.turn) - 1) / 4);
  },

  // 某城內的所有武將 id（依本勢力且 status 非 wild/captured）
  generalsIn: function (cid) {
    var out = [], gid;
    for (gid in S.generals) {
      var g = S.generals[gid];
      if (g.loc === cid && g.faction && (g.status === "normal" || g.status === "injured")) out.push(gid);
    }
    return out;
  },
  // 某勢力所有武將 id
  generalsOf: function (fid) {
    var out = [], gid;
    for (gid in S.generals) {
      var g = S.generals[gid];
      if (g.faction === fid && (g.status === "normal" || g.status === "injured")) out.push(gid);
    }
    return out;
  },
  // 某勢力擁有的城池 id
  citiesOf: function (fid) {
    var out = [], cid;
    for (cid in S.cityOwner) if (S.cityOwner[cid] === fid) out.push(cid);
    return out;
  },
  // 綜合武力值（用於挑選守將／統兵者）
  power: function (gid) {
    var g = GEN[gid]; if (!g) return 0;
    var s = g.s;
    return s[ST_LEAD] * 1.0 + s[ST_WAR] * 0.7 + s[ST_INT] * 0.5 + s[ST_POL] * 0.2;
  },
  // 城中最強武將（可指定排除已負傷者；預設可含負傷）
  bestGeneralIn: function (cid, excludeInjured) {
    var list = Q.generalsIn(cid), best = null, bv = -1, i;
    for (i = 0; i < list.length; i++) {
      var st = S.generals[list[i]];
      if (excludeInjured && st.status === "injured") continue;
      var v = Q.power(list[i]);
      if (v > bv) { bv = v; best = list[i]; }
    }
    return best;
  },
  // 相鄰
  neighbors: function (cid) { return ADJ[cid] ? ADJ[cid].slice() : []; },
  isAdj: function (a, b) { return !!(ADJ[a] && ADJ[a].indexOf(b) >= 0); },

  // 勢力總兵力
  totalTroops: function (fid) {
    var t = 0, cid;
    for (cid in S.cityOwner) if (S.cityOwner[cid] === fid) t += S.cityState[cid].troops;
    return t;
  },
  // 勢力國力評分（用於 AI / 外交 / 排行）
  factionStrength: function (fid) {
    var cities = Q.citiesOf(fid);
    var t = Q.totalTroops(fid);
    var gens = Q.generalsOf(fid).length;
    return cities.length * 1200 + t * 0.5 + gens * 250;
  },
  isAtWarPlayer: function () { return true; },
  ceasefireLeft: function (a, b) {
    var f = S.factions[a]; if (!f || !f.ceasefire) return 0;
    return f.ceasefire[b] || 0;
  }
};

/* 相鄰表（由 ADJ_PAIRS 展開為雙向鄰接表） */
var ADJ = {};
(function buildAdj() {
  var i, a, b;
  for (i = 0; i < ADJ_PAIRS.length; i++) {
    a = ADJ_PAIRS[i][0]; b = ADJ_PAIRS[i][1];
    (ADJ[a] = ADJ[a] || []).push(b);
    (ADJ[b] = ADJ[b] || []).push(a);
  }
})();

/* 對外（測試用） */
if (typeof module !== "undefined" && module.exports) {
  module.exports = { U: U, Q: Q, ADJ: ADJ,
    _attachData: function (d) { /* 測試時注入 */ } };
}

   ========================================================================= */


var MAP = {

MAP.LAND = [
  [300, 58], [470, 64], [560, 58], [650, 86], [720, 76], [792, 104],

];
/* 黃河 / 長江 */
MAP.RIVERS = [
  { name: "黃河", pts: [[248, 296], [330, 322], [445, 340], [560, 338], [650, 308], [742, 288], [864, 258]] },
  { name: "長江", pts: [[268, 470], [360, 508], [470, 520], [540, 526], [620, 536], [690, 540], [770, 508], [884, 494]] }
];

MAP.init = function (canvas) {
  MAP.cv = canvas;
  MAP.ctx = canvas.getContext("2d");
  MAP.resize();
  MAP.bindEvents();
  MAP.fit();
  window.addEventListener("resize", function () { MAP.resize(); MAP.fit(); MAP.draw(); });
};

MAP.resize = function () {
  var r = MAP.cv.getBoundingClientRect();
  MAP.dpr = window.devicePixelRatio || 1;
  MAP.W = r.width; MAP.H = r.height;
  MAP.cv.width = Math.round(r.width * MAP.dpr);
  MAP.cv.height = Math.round(r.height * MAP.dpr);
  MAP.ctx.setTransform(MAP.dpr, 0, 0, MAP.dpr, 0, 0);
};

MAP.fit = function () {
  var pad = 28;
  var sx = (MAP.W - pad * 2) / MAP.VW;
  var sy = (MAP.H - pad * 2) / MAP.VH;
  var s = Math.min(sx, sy);
  MAP.cam.scale = s;
  MAP.cam.tx = (MAP.W - MAP.VW * s) / 2;
  MAP.cam.ty = (MAP.H - MAP.VH * s) / 2;
};

MAP.v2s = function (vx, vy) {
  return { x: vx * MAP.cam.scale + MAP.cam.tx, y: vy * MAP.cam.scale + MAP.cam.ty };
};
MAP.s2v = function (sx, sy) {
  return { x: (sx - MAP.cam.tx) / MAP.cam.scale, y: (sy - MAP.cam.ty) / MAP.cam.scale };
};

/* ---------------- 繪製 ---------------- */
MAP.draw = function () {
  if (!MAP.ctx) return;
  var g = MAP.ctx, cam = MAP.cam;
  g.clearRect(0, 0, MAP.W, MAP.H);

  // 海
  g.fillStyle = "#16384a";
  g.fillRect(0, 0, MAP.W, MAP.H);
  // 海面細紋
  g.strokeStyle = "rgba(255,255,255,0.03)";
  g.lineWidth = 1;
  for (var yy = 0; yy < MAP.H; yy += 26) { g.beginPath(); g.moveTo(0, yy); g.lineTo(MAP.W, yy); g.stroke(); }

  // 大地
  g.save();
  g.beginPath();
  var p0 = MAP.v2s(MAP.LAND[0][0], MAP.LAND[0][1]);
  g.moveTo(p0.x, p0.y);
  for (var i = 1; i < MAP.LAND.length; i++) {
    var p = MAP.v2s(MAP.LAND[i][0], MAP.LAND[i][1]);
    g.lineTo(p.x, p.y);
  }
  g.closePath();
  // 漸層大地色
  var lg = g.createLinearGradient(0, 0, 0, MAP.H);
  lg.addColorStop(0, "#e9dcc0");
  lg.addColorStop(1, "#d8c49c");
  g.fillStyle = lg;
  g.shadowColor = "rgba(0,0,0,0.5)"; g.shadowBlur = 18; g.shadowOffsetY = 6;
  g.fill();
  g.shadowColor = "transparent"; g.shadowBlur = 0; g.shadowOffsetY = 0;
  g.lineWidth = 2.2; g.strokeStyle = "#5c4326"; g.stroke();
  g.clip();   // 之後的山川只畫在陸地內

  // 山脈點綴（簡易三角）
  MAP.drawMountains(g);

  // 河流
  for (var r = 0; r < MAP.RIVERS.length; r++) MAP.drawRiver(g, MAP.RIVERS[r]);
  g.restore();

  // 道路
  MAP.drawRoads(g);
  // 城池
  MAP.drawCities(g);
};

MAP.drawMountains = function (g) {
  var hills = [[210, 200], [250, 230], [300, 180], [200, 380], [240, 420],
    [410, 410], [380, 470], [330, 300], [470, 300], [820, 180], [840, 240]];
  g.fillStyle = "rgba(120,98,60,0.30)";
  for (var i = 0; i < hills.length; i++) {
    var c = MAP.v2s(hills[i][0], hills[i][1]);
    var s = 9 * MAP.cam.scale;
    if (s < 4) s = 4;
    g.beginPath();
    g.moveTo(c.x - s, c.y + s * 0.7);
    g.lineTo(c.x, c.y - s);
    g.lineTo(c.x + s, c.y + s * 0.7);
    g.closePath();
    g.fill();
  }
};

MAP.drawRiver = function (g, river) {
  var pts = river.pts;
  g.lineCap = "round"; g.lineJoin = "round";
  g.beginPath();
  var a = MAP.v2s(pts[0][0], pts[0][1]);
  g.moveTo(a.x, a.y);
  for (var i = 1; i < pts.length; i++) {
    var b = MAP.v2s(pts[i][0], pts[i][1]);
    var prev = MAP.v2s(pts[i - 1][0], pts[i - 1][1]);
    var mx = (prev.x + b.x) / 2, my = (prev.y + b.y) / 2;
    g.quadraticCurveTo(prev.x, prev.y, mx, my);
  }
  var last = MAP.v2s(pts[pts.length - 1][0], pts[pts.length - 1][1]);
  g.lineTo(last.x, last.y);
  g.lineWidth = Math.max(2.5, 5 * MAP.cam.scale);
  g.strokeStyle = "rgba(70,130,170,0.75)";
  g.stroke();
};

MAP.drawRoads = function (g) {
  g.lineWidth = Math.max(1, 1.6 * MAP.cam.scale);
  for (var i = 0; i < ADJ_PAIRS.length; i++) {
    var a = CITY[ADJ_PAIRS[i][0]], b = CITY[ADJ_PAIRS[i][1]];
    if (!a || !b) continue;
    var pa = MAP.v2s(a.x, a.y), pb = MAP.v2s(b.x, b.y);
    var o1 = S.cityOwner ? S.cityOwner[ADJ_PAIRS[i][0]] : null;
    var o2 = S.cityOwner ? S.cityOwner[ADJ_PAIRS[i][1]] : null;
    g.strokeStyle = (o1 && o1 === o2 && S.factions[o1]) ?
      MAP.hexA(S.factions[o1].color, 0.5) : "rgba(92,67,38,0.45)";
    g.setLineDash([4 * MAP.cam.scale, 4 * MAP.cam.scale]);
    g.beginPath(); g.moveTo(pa.x, pa.y); g.lineTo(pb.x, pb.y); g.stroke();
  }
  g.setLineDash([]);
};

MAP.drawCities = function (g) {
  var cid;
  for (cid in CITY) {
    var c = CITY[cid];
    var p = MAP.v2s(c.x, c.y);
    var owner = S.cityOwner ? S.cityOwner[cid] : null;
    var fac = owner ? S.factions[owner] : null;
    var col = fac ? fac.color : "#9aa0a6";
    var st = S.cityState ? S.cityState[cid] : null;
    var sel = (S.selectedCity === cid);
    var rad = 8 + (st ? U.clamp(st.troops / 6000, 0, 8) : 2);
    rad = rad * (0.7 + MAP.cam.scale * 0.5);
    rad = U.clamp(rad, 7, 22);

    // 選取光暈
    if (sel) {
      g.beginPath(); g.arc(p.x, p.y, rad + 7, 0, Math.PI * 2);
      g.fillStyle = "rgba(245,200,80,0.30)"; g.fill();
    }
    // 城池圓
    g.beginPath(); g.arc(p.x, p.y, rad, 0, Math.PI * 2);
    g.fillStyle = col; g.fill();
    g.lineWidth = sel ? 3 : 1.6;
    g.strokeStyle = sel ? "#f5c842" : "rgba(20,16,10,0.85)";
    g.stroke();

    // 首都標記（君主所在）
    if (fac && S.generals && S.generals[fac.leaderId] && S.generals[fac.leaderId].loc === cid) {
      MAP.drawStar(g, p.x, p.y - rad - 7 * MAP.cam.scale, 5 * MAP.cam.scale + 2, "#ffd75e");
    }

    // 文字（城名 + 兵力）
    var fontPx = U.clamp(13 * MAP.cam.scale, 10, 16);
    g.font = "700 " + fontPx + "px 'Noto Serif TC',serif";
    g.textAlign = "center"; g.textBaseline = "bottom";
    MAP.haloText(g, c.n, p.x, p.y - rad - 3, "#2b2218", "rgba(255,250,235,0.9)");
    if (st) {
      g.font = "600 " + (fontPx - 2) + "px system-ui,sans-serif";
      g.textBaseline = "top";
      MAP.haloText(g, U.wan(st.troops), p.x, p.y + rad + 2, owner ? "#1c1209" : "#444",
        "rgba(255,250,235,0.85)");
    }
  }
};

MAP.haloText = function (g, txt, x, y, fill, halo) {
  g.lineWidth = 3; g.strokeStyle = halo; g.lineJoin = "round";
  g.strokeText(txt, x, y);
  g.fillStyle = fill; g.fillText(txt, x, y);
};

MAP.drawStar = function (g, cx, cy, r, color) {
  g.beginPath();
  for (var i = 0; i < 5; i++) {
    var a = -Math.PI / 2 + i * 2 * Math.PI / 5;
    var a2 = a + Math.PI / 5;
    g.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    g.lineTo(cx + Math.cos(a2) * r * 0.45, cy + Math.sin(a2) * r * 0.45);
  }
  g.closePath();
  g.fillStyle = color; g.fill();
  g.lineWidth = 1; g.strokeStyle = "rgba(120,80,0,0.8)"; g.stroke();
};

MAP.hexA = function (hex, a) {
  hex = hex.replace("#", "");
  if (hex.length === 3) hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
  var r = parseInt(hex.substr(0, 2), 16), gg = parseInt(hex.substr(2, 2), 16), b = parseInt(hex.substr(4, 2), 16);
  return "rgba(" + r + "," + gg + "," + b + "," + a + ")";
};

/* ---------------- 互動：平移 / 縮放 / 點選 ---------------- */
MAP.bindEvents = function () {
  var cv = MAP.cv;
  cv.style.touchAction = "none";
  cv.addEventListener("pointerdown", MAP.onDown);
  cv.addEventListener("pointermove", MAP.onMove);
  cv.addEventListener("pointerup", MAP.onUp);
  cv.addEventListener("pointercancel", MAP.onUp);
  cv.addEventListener("pointerleave", MAP.onUp);
  cv.addEventListener("wheel", MAP.onWheel, { passive: false });
};

MAP.onDown = function (e) {
  MAP.cv.setPointerCapture(e.pointerId);
  MAP.pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  var ids = Object.keys(MAP.pointers);
  if (ids.length === 1) {
    MAP.drag = { id: e.pointerId, sx: e.clientX, sy: e.clientY,
      ox: MAP.cam.tx, oy: MAP.cam.ty, moved: false, t: Date.now() };
  } else if (ids.length === 2) {
    MAP.drag = null;
    var a = MAP.pointers[ids[0]], b = MAP.pointers[ids[1]];
    MAP.pinch = { d: MAP.dist(a, b), scale: MAP.cam.scale,
      cx: (a.x + b.x) / 2, cy: (a.y + b.y) / 2 };
  }
};

MAP.onMove = function (e) {
  if (!MAP.pointers[e.pointerId]) return;
  MAP.pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
  var ids = Object.keys(MAP.pointers);
  if (ids.length >= 2 && MAP.pinch) {
    var a = MAP.pointers[ids[0]], b = MAP.pointers[ids[1]];
    var nd = MAP.dist(a, b);
    var rect = MAP.cv.getBoundingClientRect();
    var midx = (a.x + b.x) / 2 - rect.left, midy = (a.y + b.y) / 2 - rect.top;
    var before = MAP.s2v(midx, midy);
    MAP.cam.scale = U.clamp(MAP.pinch.scale * (nd / MAP.pinch.d), 0.35, 4);
    var after = MAP.v2s(before.x, before.y);
    MAP.cam.tx += midx - after.x;
    MAP.cam.ty += midy - after.y;
    MAP.draw();
    return;
  }
  if (MAP.drag && e.pointerId === MAP.drag.id) {
    var dx = e.clientX - MAP.drag.sx, dy = e.clientY - MAP.drag.sy;
    if (Math.abs(dx) + Math.abs(dy) > 6) MAP.drag.moved = true;
    MAP.cam.tx = MAP.drag.ox + dx;
    MAP.cam.ty = MAP.drag.oy + dy;
    MAP.draw();
  }
};

MAP.onUp = function (e) {
  var wasDrag = MAP.drag;
  delete MAP.pointers[e.pointerId];
  var ids = Object.keys(MAP.pointers);
  if (ids.length < 2) MAP.pinch = null;
  if (ids.length === 0) {
    if (wasDrag && !wasDrag.moved && (Date.now() - wasDrag.t) < 500) {
      var rect = MAP.cv.getBoundingClientRect();
      MAP.tapAt(e.clientX - rect.left, e.clientY - rect.top);
    }
    MAP.drag = null;
  }
};

MAP.onWheel = function (e) {
  e.preventDefault();
  var rect = MAP.cv.getBoundingClientRect();
  var mx = e.clientX - rect.left, my = e.clientY - rect.top;
  var before = MAP.s2v(mx, my);
  var factor = e.deltaY < 0 ? 1.12 : 0.89;
  MAP.cam.scale = U.clamp(MAP.cam.scale * factor, 0.35, 4);
  var after = MAP.v2s(before.x, before.y);
  MAP.cam.tx += mx - after.x;
  MAP.cam.ty += my - after.y;
  MAP.draw();
};

MAP.dist = function (a, b) { var dx = a.x - b.x, dy = a.y - b.y; return Math.sqrt(dx * dx + dy * dy); };

MAP.tapAt = function (sx, sy) {
  var best = null, bd = 1e9, cid;
  for (cid in CITY) {
    var p = MAP.v2s(CITY[cid].x, CITY[cid].y);
    var d = Math.sqrt((p.x - sx) * (p.x - sx) + (p.y - sy) * (p.y - sy));
    if (d < bd) { bd = d; best = cid; }
  }
  var hitR = 22 + 6 * MAP.cam.scale;
  if (best && bd <= hitR) {
    AUD.play("select");
    S.selectedCity = best;
    MAP.draw();
    if (MAP.onSelect) MAP.onSelect(best);
  }
};

/* 將攝影機移到某城（置中） */
MAP.focusCity = function (cid) {
  var c = CITY[cid]; if (!c) return;
  MAP.cam.tx = MAP.W / 2 - c.x * MAP.cam.scale;
  MAP.cam.ty = MAP.H / 2 - c.y * MAP.cam.scale;
  MAP.draw();
};

if (typeof module !== "undefined" && module.exports) { module.exports = { MAP: MAP }; }

/* ===== ui.js ===== */
/* =========================================================================
   三國演義：天下歸一  ——  介面層 ui.js
   HUD、城池行動面板、武將／勢力視窗、募兵與出征、事件記錄、結局
   ========================================================================= */


var UI = { _toastTimer: null };

UI.init = function () {
  MAP.onSelect = function (cid) { UI.openCity(cid); };
  UI.refreshHud();
  UI.refreshLog();
  UI.wireHud();
};

UI.el = function (id) { return document.getElementById(id); };

/* ---------------- 頂部 HUD ---------------- */
UI.refreshHud = function () {
  var f = S.factions[S.playerFaction];
  if (!f) return;
  var cities = Q.citiesOf(S.playerFaction).length;
  var troops = Q.totalTroops(S.playerFaction);
  var hud = UI.el("hud");
  hud.innerHTML =
    '<div class="hud-left">' +
      '<div class="hud-fac" style="border-color:' + f.color + '">' +
        '<span class="hud-dot" style="background:' + f.color + '"></span>' + f.name +
      '</div>' +
      '<div class="hud-turn">公元 ' + Q.gameYear() + ' 年 · ' + U.seasonName(S.season) + '（第 ' + S.turn + ' 回合）</div>' +
    '</div>' +
    '<div class="hud-res">' +
      '<span class="res gold">金 ' + U.fmt(f.gold) + '</span>' +
      '<span class="res food">糧 ' + U.fmt(f.food) + '</span>' +
      '<span class="res city">城 ' + cities + '</span>' +
      '<span class="res troop">兵 ' + U.wan(troops) + '</span>' +
    '</div>' +
    '<div class="hud-btns">' +
      '<button class="hb" id="btnGenerals">武將</button>' +
      '<button class="hb" id="btnFactions">勢力</button>' +
      '<button class="hb" id="btnMenu">☰</button>' +
      '<button class="hb end" id="btnEnd">結束回合</button>' +
    '</div>';
  UI.wireHud();
};

UI.wireHud = function () {
  var g = UI.el("btnGenerals"), fa = UI.el("btnFactions"), m = UI.el("btnMenu"), e = UI.el("btnEnd");
  if (g) g.onclick = function () { AUD.play("click"); UI.openGenerals(); };
  if (fa) fa.onclick = function () { AUD.play("click"); UI.openFactions(); };
  if (m) m.onclick = function () { AUD.play("click"); UI.openMenu(); };
  if (e) e.onclick = function () {
    if (ENGINE.busy) return;
    AUD.play("gong");
    UI.closeCity();
    ENGINE.endPlayerTurn();
  };
};

UI.setPhase = function (text) {
  var b = UI.el("phaseBadge");
  if (!b) return;
  if (text) { b.textContent = text; b.classList.add("show"); }
  else b.classList.remove("show");
};

UI.refreshAll = function () {
  UI.refreshHud();
  UI.refreshLog();
  if (S.selectedCity && UI._cityOpen) UI.openCity(S.selectedCity);
};

/* ---------------- 事件記錄 ---------------- */
UI.refreshLog = function () {
  var bar = UI.el("logBar");
  if (!bar) return;
  var last = S.log.length ? S.log[S.log.length - 1] : null;
  bar.innerHTML = '<span class="log-ico">📜</span><span class="log-txt">' +
    (last ? UI.esc(last.text) : "亂世已起……") + '</span>';
  bar.onclick = function () { AUD.play("click"); UI.openLog(); };
};

UI.openLog = function () {
  var rows = "";
  for (var i = S.log.length - 1; i >= 0 && i >= S.log.length - 80; i--) {
    var L = S.log[i];
    rows += '<div class="logrow lt-' + L.type + '"><span class="lr-turn">' + Q.gameYear(L.turn) + '年' + U.seasonName((L.turn - 1) % 4) + '</span>' + UI.esc(L.text) + '</div>';
  }
  UI.modal("征戰記事", '<div class="logwrap">' + rows + '</div>');
};

/* ---------------- 城池面板 ---------------- */
UI.onCity = function (cid) { UI.openCity(cid); };

UI.openCity = function (cid) {
  S.selectedCity = cid;
  UI._cityOpen = true;
  var c = CITY[cid], cs = S.cityState[cid];
  var owner = S.cityOwner[cid];
  var fac = owner ? S.factions[owner] : null;
  var mine = (owner === S.playerFaction);
  var col = fac ? fac.color : "#9aa0a6";
  var ownerName = fac ? fac.name : "（無主空城）";

  var gens = Q.generalsIn(cid);
  var genHtml = "";
  if (gens.length) {
    for (var i = 0; i < gens.length; i++) {
      var g = GEN[gens[i]], gs = S.generals[gens[i]];
      var port = PORTRAIT.toDataURL(g, 48, col);
      genHtml += '<div class="genchip">' +
        '<img src="' + port + '">' +
        '<div class="gc-info"><div class="gc-name">' + g.n + (gs.status === "injured" ? ' <span class="inj">傷</span>' : '') + '</div>' +
        '<div class="gc-stat">統' + g.s[0] + ' 武' + g.s[1] + ' 智' + g.s[2] + '</div></div>' +
        (mine ? '<button class="gc-move" data-g="' + gens[i] + '">調</button>' : '') +
        '</div>';
    }
  } else {
    genHtml = '<div class="nogen">（城中無將）</div>';
  }

  var statRows =
    '<div class="cstats">' +
      '<div><b>兵力</b>' + U.fmt(cs.troops) + '</div>' +
      '<div><b>城防</b>' + cs.def + '</div>' +
      '<div><b>商業</b>' + cs.com + '</div>' +
      '<div><b>農業</b>' + cs.agr + '</div>' +
      '<div><b>民心</b>' + cs.pop + '</div>' +
      '<div><b>州</b>' + c.zhou + '</div>' +
    '</div>';

  var actions = "";
  if (mine) {
    var canAct = ENGINE.canAct(cid);
    if (canAct) {
      actions =
        '<div class="acts">' +
          '<button class="act" data-a="com">興商<small>300金</small></button>' +
          '<button class="act" data-a="agr">勸農<small>300金</small></button>' +
          '<button class="act" data-a="def">築城<small>280金</small></button>' +
          '<button class="act" data-a="pop">安民<small>120金</small></button>' +
          '<button class="act" data-a="recruit">募兵<small>徵集</small></button>' +
          '<button class="act" data-a="search">訪賢<small>200金</small></button>' +
          '<button class="act march" data-a="march">出征<small>攻城</small></button>' +
        '</div>';
    } else {
      actions = '<div class="acted">本城本季已行動完畢</div>';
    }
  } else {
    // 敵／中立城：可顯示停戰（敵方勢力）
    var hint = "";
    var adj = false, mycs = Q.citiesOf(S.playerFaction);
    for (var k = 0; k < mycs.length; k++) if (Q.isAdj(mycs[k], cid)) { adj = true; break; }
    if (adj) hint = '<div class="enemy-hint">與我方接壤，可自鄰城出征攻取。</div>';
    else hint = '<div class="enemy-hint">尚未與我方接壤。</div>';
    actions = hint;
    if (fac && owner !== S.playerFaction) {
      var cf = Q.ceasefireLeft(S.playerFaction, owner);
      if (cf > 0) actions += '<div class="ceasefire">停戰盟約尚餘 ' + cf + ' 年</div>';
      else actions += '<div class="acts one"><button class="act" data-a="ceasefire">請求停戰</button></div>';
    }
  }

  var html =
    '<div class="cs-head" style="border-color:' + col + '">' +
      '<div class="cs-title">' + c.n + '</div>' +
      '<div class="cs-owner"><span class="hud-dot" style="background:' + col + '"></span>' + ownerName + '</div>' +
      '<button class="cs-close" id="csClose">✕</button>' +
    '</div>' +
    statRows +
    '<div class="cs-sub">城中武將</div>' +
    '<div class="genlist">' + genHtml + '</div>' +
    actions;

  UI.sheet(html);
  UI.wireCity(cid);
};

UI.wireCity = function (cid) {
  var cl = UI.el("csClose");
  if (cl) cl.onclick = function () { AUD.play("click"); UI.closeCity(); };
  var sheet = UI.el("citySheet");
  var acts = sheet.querySelectorAll(".act");
  for (var i = 0; i < acts.length; i++) {
    (function (b) {
      b.onclick = function () {
        var a = b.getAttribute("data-a");
        AUD.play("click");
        if (a === "com" || a === "agr" || a === "def") ENGINE.actDevelop(cid, a);
        else if (a === "pop") ENGINE.actGovern(cid);
        else if (a === "search") ENGINE.actSearch(cid);
        else if (a === "recruit") UI.recruitView(cid);
        else if (a === "march") UI.marchView(cid);
        else if (a === "ceasefire") ENGINE.requestCeasefire(S.cityOwner[cid]);
      };
    })(acts[i]);
  }
  var moves = sheet.querySelectorAll(".gc-move");
  for (var j = 0; j < moves.length; j++) {
    (function (b) {
      b.onclick = function () { AUD.play("click"); UI.moveGeneralView(b.getAttribute("data-g"), cid); };
    })(moves[j]);
  }
};

UI.closeCity = function () {
  UI._cityOpen = false;
  var s = UI.el("citySheet");
  if (s) s.classList.remove("open");
};

UI.sheet = function (html) {
  var s = UI.el("citySheet");
  s.innerHTML = html;
  s.classList.add("open");
};

/* ---- 募兵子面板 ---- */
UI.recruitView = function (cid) {
  var cs = S.cityState[cid];

  var html =
    '<div class="cs-head"><div class="cs-title">募兵 · ' + CITY[cid].n + '</div>' +
      '<button class="cs-close" id="rcBack">返回</button></div>' +
    '<div class="dlg">' +
      '<div class="dlg-row">現有兵力 ' + U.fmt(cs.troops) + '　國庫 ' + U.fmt(f.gold) + ' 金</div>' +

  var nb = Q.neighbors(cid);

  for (var i = 0; i < nb.length; i++) if (S.cityOwner[nb[i]] !== S.playerFaction) targets.push(nb[i]);
  if (!targets.length) { UI.toast("四鄰皆我方城池，無從出征"); return; }

  var tHtml = "";
  for (var t = 0; t < targets.length; t++) {
    var tid = targets[t], to = CITY[tid], tcs = S.cityState[tid];
    var own = S.cityOwner[tid];
    var col = own ? S.factions[own].color : "#9aa0a6";
    var nm = own ? S.factions[own].name : "空城";
    var cf = own ? Q.ceasefireLeft(S.playerFaction, own) : 0;
    tHtml += '<button class="tgt' + (cf > 0 ? ' dis' : '') + '" data-t="' + tid + '"' + (cf > 0 ? ' disabled' : '') + '>' +
      '<span class="tg-dot" style="background:' + col + '"></span>' +
      '<b>' + to.n + '</b><small>' + nm + ' · 兵' + U.wan(tcs.troops) + ' · 防' + tcs.def + (cf > 0 ? ' · 停戰中' : '') + '</small></button>';
  }

  // 統兵將領
  var gens = Q.generalsIn(cid);
  var gHtml = '<button class="gsel sel" data-g="">不派將</button>';
  for (var k = 0; k < gens.length; k++) {
    var g = GEN[gens[k]], gs = S.generals[gens[k]];
    if (gs.status === "injured") continue;
    gHtml += '<button class="gsel" data-g="' + gens[k] + '">' + g.n + '<small>武' + g.s[1] + '</small></button>';
  }

  var maxT = cs.troops - 500;
  var initT = Math.min(Math.max(2000, Math.round(maxT * 0.7)), maxT);
  if (initT < 1000) initT = Math.min(1000, maxT);

  var html =
    '<div class="cs-head"><div class="cs-title">出征 · 自 ' + CITY[cid].n + '</div>' +
      '<button class="cs-close" id="mcBack">返回</button></div>' +
    '<div class="dlg">' +
      '<div class="dlg-sub">攻打目標</div>' +
      '<div class="tgts">' + tHtml + '</div>' +
      '<div class="dlg-sub">統兵將領</div>' +
      '<div class="gsels">' + gHtml + '</div>' +
      '<div class="dlg-sub">出征兵力（留守至少 500）</div>' +
      '<input type="range" id="mcRange" min="1000" max="' + Math.max(maxT, 1000) + '" step="500" value="' + initT + '">' +
      '<div class="dlg-big"><span id="mcAmt">' + U.fmt(initT) + '</span> 兵</div>' +
      '<button class="dlg-go" id="mcGo" disabled>出征</button>' +
    '</div>';
  UI.sheet(html);
