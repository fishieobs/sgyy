/* ===== battle.js ===== */
/* =========================================================================
   三國演義：天下歸一  ——  戰鬥層 battle.js
   互動式回合戰鬥、單挑、火計、自動戰鬥、俘虜處理
   核心數學 BATTLE.step 為純函式（可於 Node 測試平衡）
   ========================================================================= */


var BATTLE = {
  ctx: null,        // 當前戰鬥情境
  busy: false       // 動畫進行中，鎖住按鈕
};

/* ---- 由武將 id 生出戰鬥側資料 ---- */
BATTLE.makeSide = function (fid, genId, troops, wall) {
  var g = genId ? GEN[genId] : null;
  var st = genId ? S.generals[genId] : null;
  var inj = st && st.status === "injured";
  var s = g ? g.s : [60, 50, 50, 50, 50];
  var penalty = inj ? 0.85 : 1;
  return {
    fid: fid,
    genId: genId,
    name: g ? g.n : "（無將）",
    color: (S.factions[fid] && S.factions[fid].color) || "#888",
    lead: s[ST_LEAD] * penalty,
    war: s[ST_WAR] * penalty,
    int: s[ST_INT] * penalty,
    cha: s[ST_CHA],
    troops: troops,
    troops0: troops,
    morale: 100,
    wall: wall || 0,
    fireUsed: false,
    injured: inj,
    isPlayer: (fid === S.playerFaction),
    // 困難 / 普通開局者：將士用命，戰力略增（攻守皆然）
    edge: (fid === S.playerFaction) ? (typeof ENGINE !== "undefined" ? ENGINE.playerEdge() : 1) : 1
  };
};

/* ====================== 純戰鬥數學 ====================== */
/* off：攻擊倍率；def 守城牆減傷 */
BATTLE._off = function (t) {
  switch (t) {
    case "assault": return 1.0;
    case "strat": return 0.62;
    case "fire": return 1.5;
    case "defend": return 0.42;
    default: return 1.0;
  }
};
BATTLE._qual = function (s) {
  return 0.55 + s.lead * 0.006 + s.war * 0.0018 + s.morale * 0.0040;
};

/* 解一個回合（會直接改動 att/def 的 troops 與 morale）；回傳本回合摘要 */
BATTLE.step = function (att, def, attT, defT) {
  var ev = [];
  var res = { attLoss: 0, defLoss: 0, attMor: 0, defMor: 0, duel: null, fire: null, declined: false, ev: ev };

  /* —— 單挑（任一方選 duel） —— */
  var duelSide = null, foeSide = null;
  if (attT === "duel") { duelSide = att; foeSide = def; }
  else if (defT === "duel") { duelSide = def; foeSide = att; }
  if (duelSide) {
    if (!duelSide.genId || !foeSide.genId) {
      res.declined = true; ev.push("無將可挑，單挑作罷。");
      // 視為普通對峙，雙方輕微消耗
    } else if (!BATTLE._accept(foeSide, duelSide)) {
      res.declined = true;
      ev.push(foeSide.name + "拒不出戰，按兵據守。");
      foeSide.morale = U.clamp(foeSide.morale + 4, 0, 120);
      duelSide.morale = U.clamp(duelSide.morale - 3, 0, 120);
    } else {
      var d = BATTLE.doDuel(duelSide, foeSide);
      res.duel = d;
      // 套用單挑結果
      if (d.winner !== "draw") {
        var winS = d.winner === "actor" ? duelSide : foeSide;
        var loseS = d.winner === "actor" ? foeSide : duelSide;
        winS.morale = U.clamp(winS.morale + 16, 0, 120);
        loseS.morale = U.clamp(loseS.morale - 26, 0, 120);
        var chip = Math.round(loseS.troops * 0.03);
        loseS.troops = Math.max(0, loseS.troops - chip);
        d.loserSideRef = loseS;          // finish 用：標記負傷
        d.loserGen = (loseS === att) ? att.genId : def.genId;
      } else {
        duelSide.morale = U.clamp(duelSide.morale - 2, 0, 120);
        foeSide.morale = U.clamp(foeSide.morale - 2, 0, 120);
      }
    }
    // 單挑回合不再進行大規模廝殺（雙方僅小幅接觸）
    var minorA = Math.round(att.troops * U.rnd(0.01, 0.025));
    var minorD = Math.round(def.troops * U.rnd(0.01, 0.025));
    att.troops = Math.max(0, att.troops - minorA);
    def.troops = Math.max(0, def.troops - minorD);
    res.attLoss = minorA; res.defLoss = minorD;
    return res;
  }

  /* —— 一般廝殺 —— */
  var aBefore = att.troops, dBefore = def.troops;
  var ea = Math.pow(Math.max(att.troops, 1), 0.88) * BATTLE._qual(att) * BATTLE._off(attT) * (att.edge || 1);
  var ed = Math.pow(Math.max(def.troops, 1), 0.88) * BATTLE._qual(def) * BATTLE._off(defT) * (def.edge || 1);
  var total = ea + ed;
  var shareA = ea / total;                  // 攻方戰力佔比 → 守方傷亡
  var force = att.troops + def.troops;
  var scale = 0.15;
  var wallRed = U.clamp(1 - def.wall * 0.0035, 0.52, 1);

  var defCas = force * scale * shareA * wallRed * (defT === "defend" ? 0.5 : 1) * U.rnd(0.85, 1.15);
  var attCas = force * scale * (1 - shareA) * (attT === "defend" ? 0.5 : 1) * U.rnd(0.85, 1.15);
  defCas = Math.round(defCas); attCas = Math.round(attCas);

  /* 計略：以智取勝，附帶士氣打擊 */
  if (attT === "strat") {
    var m = Math.round(U.clamp((att.int - def.int) * 0.15 + 6, 2, 22));
    def.morale -= m; res.ev.push("我軍施計，敵軍動搖（士氣 −" + m + "）。");
  } else if (defT === "strat") {
    var m2 = Math.round(U.clamp((def.int - att.int) * 0.15 + 6, 2, 22));
    att.morale -= m2;
  }

  /* 火計：大傷＋亂其士氣，逆風時可能反噬 */
  function applyFire(actor, target, label) {
    var backfire = (target.int > actor.int + 10) && U.chance(0.30);
    if (backfire) {
      var self = Math.round(actor.troops * 0.05);
      actor.troops = Math.max(0, actor.troops - self);
      actor.morale -= 12;
      res.fire = { who: label, backfire: true };
      res.ev.push("火計反遭識破，反為所制！");
    } else {
      var burn = Math.round(target.troops * U.rnd(0.06, 0.10));
      target.troops = Math.max(0, target.troops - burn);
      target.morale -= 16;
      if (label === "att") res.defLoss += burn; else res.attLoss += burn;
      res.fire = { who: label, backfire: false, burn: burn };
      res.ev.push("烈焰沖天，敵陣大亂（折損約 " + U.wan(burn) + "）！");
    }
    actor.fireUsed = true;
  }
  if (attT === "fire" && !att.fireUsed) applyFire(att, def, "att");
  if (defT === "fire" && !def.fireUsed) applyFire(def, att, "def");

  /* 堅守：回復士氣 */
  if (attT === "defend") att.morale += 8;
  if (defT === "defend") def.morale += 8;

  att.troops = Math.max(0, att.troops - attCas);
  def.troops = Math.max(0, def.troops - defCas);
  res.attLoss += attCas; res.defLoss += defCas;

  /* 士氣：傷亡比例越高，士氣掉越多；守城牆可緩和守軍士氣崩潰 */
  var aFrac = attCas / Math.max(aBefore, 1), dFrac = defCas / Math.max(dBefore, 1);
  var aHit = Math.round(aFrac * 100 * 0.9), dHit = Math.round(dFrac * 100 * 0.9 * (1 - def.wall * 0.0022));
  att.morale -= aHit; def.morale -= dHit;
  res.attMor = aHit; res.defMor = dHit;

  att.morale = U.clamp(att.morale, 0, 120);
  def.morale = U.clamp(def.morale, 0, 120);
  return res;
};

/* AI 是否接受單挑 */
BATTLE._accept = function (foe, challenger) {
  if (!foe.genId) return false;
  if (foe.war >= challenger.war - 6) return true;
  if (foe.morale < 35) return U.chance(0.5);   // 危急時搏命
  return U.chance(0.25);
};

/* 單挑解算 */
BATTLE.doDuel = function (actor, foe) {
  var pts = 0, ex = [], i;
  for (i = 0; i < 6; i++) {
    var a = actor.war + U.irnd(-15, 15);
    var f = foe.war + U.irnd(-15, 15);
    var s = a > f ? 1 : (a < f ? -1 : 0);
    pts += s;
    ex.push({ actor: a, foe: f, lead: pts });
    if (Math.abs(pts) >= 3) break;
  }
  var winner = pts > 0 ? "actor" : (pts < 0 ? "target" : "draw");
  return { winner: winner, exchanges: ex, actorName: actor.name, foeName: foe.name };
};

/* ====================== 自動解算（AI 對 AI／快速） ====================== */
/* 回傳 {winner:"att"|"def", att, def, rounds} ；不觸碰 DOM */
BATTLE.autoResolveSides = function (att, def, maxRound) {
  maxRound = maxRound || 14;
  var r;
  for (r = 1; r <= maxRound; r++) {
    var aT = BATTLE.aiTactic(att, def, true);
    var dT = BATTLE.aiTactic(def, att, false);
    if (aT === "retreat") return { winner: "def", att: att, def: def, rounds: r, retreat: true };
    BATTLE.step(att, def, aT, dT);
    if (def.troops <= BATTLE._dead(def) || def.morale <= 0) return { winner: "att", att: att, def: def, rounds: r };
    if (att.troops <= BATTLE._dead(att) || att.morale <= 0) return { winner: "def", att: att, def: def, rounds: r };
  }
  return { winner: att.troops > def.troops ? "att" : "def", att: att, def: def, rounds: maxRound, timeout: true };
};
BATTLE._dead = function (s) { return Math.max(200, Math.round(s.troops0 * 0.04)); };

/* AI 戰術選擇 */
BATTLE.aiTactic = function (side, foe, isAtt) {
  if (isAtt && side.morale < 26 && side.troops < foe.troops * 0.8) return "retreat";
  if (!isAtt && side.troops < foe.troops * 0.55) {
    if (side.int >= 80 && !side.fireUsed && U.chance(0.5)) return "fire";
    return U.chance(0.6) ? "defend" : "assault";
  }
  if (side.genId && foe.genId && side.war >= 86 && side.war >= foe.war - 4 && U.chance(0.22)) return "duel";
  if (!side.fireUsed && side.int >= 82 && U.chance(0.30)) return "fire";
  if (side.int >= 78 && side.int > foe.int && U.chance(0.30)) return "strat";
  if (side.morale < 45 && U.chance(0.4)) return "defend";
  return "assault";
};

/* ====================== 互動戰鬥（玩家參與） ====================== */
BATTLE.begin = function (opt) {
  // opt: {fromCity,toCity,attFid,attGenId,attTroops,onComplete}
  var toCity = opt.toCity, fromCity = opt.fromCity;
  var defFid = S.cityOwner[toCity];
  var defGenId = Q.bestGeneralIn(toCity, false);
  var defTroops = S.cityState[toCity].troops;
  var wall = S.cityState[toCity].def;

  var att = BATTLE.makeSide(opt.attFid, opt.attGenId, opt.attTroops, 0);
  var def = BATTLE.makeSide(defFid, defGenId, defTroops, wall);

  BATTLE.ctx = {
    fromCity: fromCity, toCity: toCity,
    att: att, def: def,
    defFid: defFid, defGenId: defGenId,
    round: 0, maxRound: 12,
    playerSide: att.isPlayer ? "att" : (def.isPlayer ? "def" : null),
    onComplete: opt.onComplete || function () {},
    finished: false, capturedQueue: []
  };

  if (BATTLE.ctx.playerSide === null) {
    // 純 AI 對戰：直接自動解算，不開畫面
    var rr = BATTLE.autoResolveSides(att, def, 14);
    BATTLE.applyOutcome(rr.winner, true);
    return;
  }
  AUD.setMode("battle");
  BATTLE.renderStage();
  BATTLE.nextRound();
};

BATTLE.nextRound = function () {
  var c = BATTLE.ctx;
  if (c.finished) return;
  c.round++;
  if (c.round > c.maxRound) {
    var w = c.att.troops > c.def.troops ? "att" : "def";
    BATTLE.endBattle(w, "圍城日久，" + (w === "att" ? "終於破城！" : "攻方力竭而退。"));
    return;
  }
  BATTLE.updateStage();
  BATTLE.enableControls(true);
  BATTLE.log("【第 " + c.round + " 回合】請下令……", "turn");
  // 若玩家是守方，攻方為 AI，等玩家先下令（守方亦由玩家操作）——雙方皆等玩家點擊
};

/* 玩家點擊戰術 */
BATTLE.playerAct = function (tactic) {
  var c = BATTLE.ctx;
  if (c.finished || BATTLE.busy) return;
  if (tactic === "retreat") {
    // 只有攻方能撤退；守方「撤退」＝棄城（亦允許，視為敗）
    BATTLE.enableControls(false);
    if (c.playerSide === "att") { BATTLE.endBattle("def", "我軍鳴金收兵，徐徐而退。"); }
    else { BATTLE.endBattle("att", "守軍棄城而走……"); }
    return;
  }
  BATTLE.enableControls(false);
  var pSide = c.playerSide;
  var aSide = pSide === "att" ? "def" : "att";
  var aTactic = BATTLE.aiTactic(c[aSide], c[pSide], aSide === "att");
  if (aTactic === "retreat") {
    // AI（攻方）撤退
    BATTLE.runRoundAnim(pSide === "att" ? tactic : aTactic, pSide === "att" ? aTactic : tactic, function () {
      BATTLE.endBattle(aSide === "att" ? "def" : "att", "敵軍士氣崩潰，倉皇撤退！");
    });
    return;
  }
  var attT = pSide === "att" ? tactic : aTactic;
  var defT = pSide === "att" ? aTactic : tactic;
  BATTLE.runRoundAnim(attT, defT, function () {
    BATTLE.afterRound();
  });
};

/* 套用一回合並播放動畫 */
BATTLE.runRoundAnim = function (attT, defT, done) {
  var c = BATTLE.ctx;
  BATTLE.busy = true;
  var res = BATTLE.step(c.att, c.def, attT, defT);
  // 音效
  if (res.duel) AUD.play("sword");
  else if (res.fire) AUD.play("fire");
  else AUD.play("charge");
  // 動畫：晃動 + 數字飛出
  BATTLE.flash(attT, defT, res);
  if (res.duel && !res.declined) BATTLE.showDuel(res.duel);
  // 記錄
  if (res.ev && res.ev.length) { for (var i = 0; i < res.ev.length; i++) BATTLE.log(res.ev[i], "ev"); }
  BATTLE.log("廝殺：我方損 " + U.fmt(BATTLE.sideLoss(res, "player")) +
             "、敵方損 " + U.fmt(BATTLE.sideLoss(res, "foe")), "fight");
  setTimeout(function () {
    BATTLE.updateStage();
    BATTLE.busy = false;
    done();
  }, res.duel && !res.declined ? 1500 : 750);
};
BATTLE.sideLoss = function (res, who) {
  var pSide = BATTLE.ctx.playerSide;
  var playerLoss = pSide === "att" ? res.attLoss : res.defLoss;
  var foeLoss = pSide === "att" ? res.defLoss : res.attLoss;
  return who === "player" ? playerLoss : foeLoss;
};

BATTLE.afterRound = function () {
  var c = BATTLE.ctx;
  if (c.def.troops <= BATTLE._dead(c.def) || c.def.morale <= 0) { BATTLE.endBattle("att", c.def.morale <= 0 ? "敵軍士氣盡喪，全線潰敗！" : "敵軍折損殆盡，城池易主！"); return; }
  if (c.att.troops <= BATTLE._dead(c.att) || c.att.morale <= 0) { BATTLE.endBattle("def", c.att.morale <= 0 ? "我軍士氣崩潰……" : "攻方傷亡慘重，被迫退去。"); return; }
  BATTLE.nextRound();
};

BATTLE.autoFinish = function () {
  var c = BATTLE.ctx;
  if (c.finished || BATTLE.busy) return;
  BATTLE.enableControls(false);
  // 從當前狀態快速跑完
  var rr = BATTLE.autoResolveSides(c.att, c.def, c.maxRound - c.round + 1);
  BATTLE.updateStage();
  BATTLE.endBattle(rr.winner, rr.retreat ? "鳴金收兵。" : (rr.winner === (c.playerSide) ? "大獲全勝！" : "戰事失利。"));
};

/* 結束戰鬥 → 套用結果 */
BATTLE.endBattle = function (winnerSide, msg) {
  var c = BATTLE.ctx;
  if (c.finished) return;
  c.finished = true;
  BATTLE.enableControls(false);
  var playerWon = (winnerSide === c.playerSide);
  AUD.play(playerWon ? "gong" : "gong");
  BATTLE.log(msg, "result");
  setTimeout(function () { BATTLE.applyOutcome(winnerSide, false); }, 600);
};

/* ====================== 結果套用（含俘虜） ====================== */
BATTLE.applyOutcome = function (winnerSide, silent) {
  var c = BATTLE.ctx;
  var att = c.att, def = c.def, toCity = c.toCity, fromCity = c.fromCity;
  var capQueue = [];

  if (winnerSide === "att") {
    /* —— 破城 —— */
    var defFid = c.defFid;
    var defenders = Q.generalsIn(toCity);           // 破城前守軍諸將
    // 換主
    S.cityOwner[toCity] = att.fid;
    S.cityState[toCity].troops = Math.max(att.troops, 500);
    S.cityState[toCity].pop = U.clamp(S.cityState[toCity].pop - 15, 10, 100);
    S.cityState[toCity].acted = true;
    // 攻方主將進城
    if (att.genId) { S.generals[att.genId].loc = toCity; S.generals[att.genId].faction = att.fid; }

    var defFaction = S.factions[defFid];
    var stillHas = defFid ? Q.citiesOf(defFid) : [];
    var lastStand = (defFid && stillHas.length === 0);

    var i, gid, gs;
    for (i = 0; i < defenders.length; i++) {
      gid = defenders[i]; gs = S.generals[gid];
      var isLeader = defFaction && defFaction.leaderId === gid;
      var isCommander = (gid === c.defGenId);
      if (isLeader && !lastStand) {
        // 君主逃往他城
        var dest = U.pick(stillHas);
        gs.loc = dest;
      } else if (isLeader && lastStand) {
        // 君主被擒 → 勢力滅亡
        capQueue.push({ gid: gid, origFid: defFid, atCity: toCity, leader: true });
      } else {
        var caught = lastStand || (isCommander && U.chance(0.7)) || (!isCommander && stillHas.length === 0);
        if (caught) {
          capQueue.push({ gid: gid, origFid: defFid, atCity: toCity, leader: false });
        } else {
          // 突圍逃往他城
          if (stillHas.length) gs.loc = U.pick(stillHas);
          else { BATTLE._makeWild(gid, toCity); }
        }
      }
    }
    if (!silent) AUD.play("victory");
  } else {
    /* —— 守城成功 / 攻方撤退 —— */
    S.cityState[fromCity].troops += Math.max(att.troops, 0);
    S.cityState[toCity].troops = Math.max(def.troops, 300);
    S.cityState[toCity].pop = U.clamp(S.cityState[toCity].pop - 3, 5, 100);
    // 攻方主將留在原城（未移動）
  }

  // 單挑負傷標記
  if (c.lastDuelLoser) { /* 已於 step 即時處理 morale，此處標記負傷 */ }

  c.capturedQueue = capQueue;

  // 勢力存亡檢查（被攻方）
  ENGINE.checkFactionAlive(c.defFid);

  if (silent) {
    // AI 對 AI：自動處理俘虜
    BATTLE.autoResolveCaptives(capQueue, att.fid);
    BATTLE.cleanup(false);
    return;
  }

  // 互動：先關戰場、若有俘虜且玩家為勝方 → 顯示處置；否則 AI 處置
  var playerWon = (winnerSide === c.playerSide);
  if (capQueue.length && playerWon && att.fid === S.playerFaction && winnerSide === "att") {
    BATTLE.showCaptives(capQueue, att.fid);
  } else if (capQueue.length && winnerSide === "att") {
    // 攻方為 AI（玩家守城失敗）→ AI 自動處置
    BATTLE.autoResolveCaptives(capQueue, att.fid);
    BATTLE.showResultScreen(playerWon);
  } else {
    BATTLE.showResultScreen(playerWon);
  }
};

BATTLE._makeWild = function (gid, near) {
  var gs = S.generals[gid];
  gs.faction = null; gs.loc = null; gs.status = "wild";
  var exists = false;
  for (var i = 0; i < S.wildPool.length; i++) if (S.wildPool[i].id === gid) { exists = true; S.wildPool[i].discovered = false; S.wildPool[i].near = near; }
  if (!exists) S.wildPool.push({ id: gid, near: near, minTurn: 1, discovered: false });
};

/* 玩家處置俘虜 */
BATTLE.recruitChance = function (captorFid, gid) {
  var leaderId = S.factions[captorFid].leaderId;
  var cha = GEN[leaderId] ? GEN[leaderId].s[ST_CHA] : 70;
  var cap = GEN[gid];
  var base = 0.30 + (cha - cap.s[ST_CHA]) / 180;
  if (cap.t === "君") base -= 0.40;
  if (cap.t === "士") base += 0.06;
  return U.clamp(base, 0.05, 0.92);
};
BATTLE.doRecruit = function (item, captorFid) {
  var gid = item.gid, gs = S.generals[gid];
  if (U.chance(BATTLE.recruitChance(captorFid, gid))) {
    gs.faction = captorFid; gs.loc = item.atCity; gs.status = "normal"; gs.injuredTurns = 0;
    AUD.play("recruit");
    ENGINE.pushLog(GEN[gid].n + " 感念恩義，歸順麾下！", "recruit");
    return true;
  } else {
    BATTLE._makeWild(gid, item.atCity);
    ENGINE.pushLog(GEN[gid].n + " 寧死不降，掛冠而去。", "info");
    return false;
  }
};
BATTLE.doRelease = function (item) {
  var gid = item.gid, gs = S.generals[gid];
  var orig = S.factions[item.origFid];
  if (orig && orig.alive) {
    var cs = Q.citiesOf(item.origFid);
    if (cs.length) { gs.faction = item.origFid; gs.loc = U.pick(cs); gs.status = "normal"; }
    else BATTLE._makeWild(gid, item.atCity);
  } else BATTLE._makeWild(gid, item.atCity);
  ENGINE.pushLog("釋放了 " + GEN[gid].n + "，以彰仁德。", "info");
};
BATTLE.doBehead = function (item) {
  var gid = item.gid, gs = S.generals[gid];
  gs.faction = null; gs.loc = null; gs.status = "dead";
  ENGINE.pushLog("斬 " + GEN[gid].n + "！三軍震懾。", "result");
};

BATTLE.autoResolveCaptives = function (queue, captorFid) {
  var i;
  for (i = 0; i < queue.length; i++) {
    var item = queue[i];
    var cap = GEN[item.gid];
    if (cap.t === "君" || item.leader) {
      // 君主：少數歸降，多半釋放，偶爾斬
      if (U.chance(0.10)) BATTLE.doBehead(item);
      else BATTLE.doRelease(item);
      if (item.leader) ENGINE.checkFactionAlive(item.origFid);
    } else {
      if (U.chance(BATTLE.recruitChance(captorFid, item.gid))) BATTLE.doRecruit(item, captorFid);
      else if (U.chance(0.15)) BATTLE.doBehead(item);
      else BATTLE.doRelease(item);
    }
  }
};

/* ====================== 戰場 DOM / 動畫 ====================== */
BATTLE.renderStage = function () {
  var c = BATTLE.ctx;
  var ov = document.getElementById("battleOverlay");
  ov.classList.add("show");
  var pSide = c.playerSide;
  var mine = c[pSide], foe = c[pSide === "att" ? "def" : "att"];
  var role = pSide === "att" ? "攻城" : "守城";
  document.getElementById("battleTitle").textContent =
    "⚔ " + Q.cityName(c.toCity) + "　·　" + role + "戰";

  function sideHtml(side, who) {
    var portrait = side.genId ? PORTRAIT.toDataURL(GEN[side.genId], 96, side.color) : "";
    return '' +
      '<div class="bt-side ' + who + '" id="btSide-' + who + '">' +
        '<div class="bt-banner" style="background:' + side.color + '">' + side.name + (side.injured ? '（傷）' : '') + '</div>' +
        (portrait ? '<img class="bt-port" src="' + portrait + '">' : '<div class="bt-port noport">無將</div>') +
        '<div class="bt-troops" id="btTroops-' + who + '">' + U.fmt(side.troops) + '</div>' +
        '<div class="bt-bar"><div class="bt-bar-fill troopfill" id="btTroopBar-' + who + '"></div></div>' +
        '<div class="bt-morale">士氣 <span id="btMorTxt-' + who + '">' + Math.round(side.morale) + '</span></div>' +
        '<div class="bt-bar small"><div class="bt-bar-fill morfill" id="btMorBar-' + who + '"></div></div>' +
      '</div>';
  }
  var stage = document.getElementById("battleStage");
  stage.innerHTML =
    sideHtml(mine, "mine") +
    '<div class="bt-vs" id="btVs">⚔</div>' +
    sideHtml(foe, "foe");

  document.getElementById("battleLog").innerHTML = "";
  BATTLE.updateStage();
  BATTLE.buildControls();
};

BATTLE.updateStage = function () {
  var c = BATTLE.ctx;
  var pSide = c.playerSide;
  var mine = c[pSide], foe = c[pSide === "att" ? "def" : "att"];
  function upd(side, who) {
    var tt = document.getElementById("btTroops-" + who);
    var tb = document.getElementById("btTroopBar-" + who);
    var mt = document.getElementById("btMorTxt-" + who);
    var mb = document.getElementById("btMorBar-" + who);
    if (tt) tt.textContent = U.fmt(side.troops);
    if (tb) tb.style.width = U.clamp(side.troops / Math.max(side.troops0, 1) * 100, 0, 100) + "%";
    if (mt) mt.textContent = Math.round(side.morale);
    if (mb) {
      var mw = U.clamp(side.morale, 0, 100);
      mb.style.width = mw + "%";
      mb.style.background = side.morale < 30 ? "#c0392b" : (side.morale < 60 ? "#d68910" : "#27ae60");
    }
  }
  upd(mine, "mine"); upd(foe, "foe");
};

BATTLE.buildControls = function () {
  var c = BATTLE.ctx;
  var bar = document.getElementById("battleControls");
  var pSide = c.playerSide;
  var mine = c[pSide];
  var canDuel = mine.genId;
  var canFire = mine.genId && !mine.fireUsed && mine.int >= 65;
  var btns = [
    { k: "assault", t: "突擊", d: "正面強攻，殺傷最大" },
    { k: "strat", t: "計略", d: "以智取勝，挫敵士氣" },
    { k: "defend", t: "堅守", d: "減傷並回復士氣" }
  ];
  if (canDuel) btns.push({ k: "duel", t: "單挑", d: "遣將挑戰敵將" });
  btns.push({ k: "fire", t: "火計", d: "焚敵陣，一戰一次", dis: !canFire });
  btns.push({ k: "retreat", t: pSide === "att" ? "撤退" : "棄守", d: "脫離戰鬥", warn: true });
  btns.push({ k: "auto", t: "自動", d: "電腦接管至結束", auto: true });

  var html = "";
  for (var i = 0; i < btns.length; i++) {
    var b = btns[i];
    html += '<button class="bt-btn' + (b.warn ? ' warn' : '') + (b.auto ? ' auto' : '') + '"' +
      (b.dis ? ' disabled' : '') +
      ' data-k="' + b.k + '"><span class="bt-bk">' + b.t + '</span><span class="bt-bd">' + b.d + '</span></button>';
  }
  bar.innerHTML = html;
  var nodes = bar.querySelectorAll(".bt-btn");
  for (var j = 0; j < nodes.length; j++) {
    (function (node) {
      node.addEventListener("click", function () {
        var k = node.getAttribute("data-k");
        AUD.play("click");
        if (k === "auto") BATTLE.autoFinish();
        else BATTLE.playerAct(k);
      });
    })(nodes[j]);
  }
};

BATTLE.enableControls = function (on) {
  var bar = document.getElementById("battleControls");
  if (!bar) return;
  var nodes = bar.querySelectorAll(".bt-btn");
  for (var i = 0; i < nodes.length; i++) {
    var k = nodes[i].getAttribute("data-k");
    if (k === "fire") {
      var mine = BATTLE.ctx[BATTLE.ctx.playerSide];
      nodes[i].disabled = !on || mine.fireUsed || mine.int < 65;
    } else nodes[i].disabled = !on;
  }
};

BATTLE.flash = function (attT, defT, res) {
  var vs = document.getElementById("btVs");
  if (vs) {
    vs.classList.remove("clash"); void vs.offsetWidth; vs.classList.add("clash");
    if (res.fire) { vs.textContent = "🔥"; }
    else if (res.duel) { vs.textContent = "⚔"; }
    else { vs.textContent = "⚔"; }
  }
  var foe = document.getElementById("btSide-foe");
  var mine = document.getElementById("btSide-mine");
  function shake(el) { if (!el) return; el.classList.remove("shake"); void el.offsetWidth; el.classList.add("shake"); }
  shake(foe); shake(mine);
};

BATTLE.showDuel = function (d) {

BATTLE.showCaptives = function (queue, captorFid) {

};
BATTLE.renderCaptive = function () {
  var queue = BATTLE._capQueue, idx = BATTLE._capIdx, captorFid = BATTLE._capFid;

  var port = PORTRAIT.toDataURL(g, 110, color);
  var chance = Math.round(BATTLE.recruitChance(captorFid, item.gid) * 100);
  body.innerHTML =
    '<div class="cap-head">擒獲敵將（' + (idx + 1) + '/' + queue.length + '）</div>' +
    '<img class="cap-port" src="' + port + '">' +
    '<div class="cap-name">' + g.n + '　<span class="cap-type">' + g.t + '</span></div>' +
    '<div class="cap-stats">統 ' + g.s[0] + '　武 ' + g.s[1] + '　智 ' + g.s[2] + '　政 ' + g.s[3] + '　魅 ' + g.s[4] + '</div>' +
    '<div class="cap-chance">勸降成功率約 ' + chance + '%</div>' +
    '<div class="cap-btns">' +
      '<button class="cap-b recruit" data-a="recruit">登用</button>' +
      '<button class="cap-b release" data-a="release">釋放</button>' +
      '<button class="cap-b behead" data-a="behead">斬首</button>' +
    '</div>';
  var btns = body.querySelectorAll(".cap-b");
  for (var i = 0; i < btns.length; i++) {
    (function (b) {
      b.addEventListener("click", function () {
        var a = b.getAttribute("data-a");
        AUD.play("click");
        if (a === "recruit") BATTLE.doRecruit(item, captorFid);
        else if (a === "release") BATTLE.doRelease(item);
        else BATTLE.doBehead(item);
        if (item.leader) ENGINE.checkFactionAlive(item.origFid);
        BATTLE._capIdx++;
        BATTLE.renderCaptive();
      });
    })(btns[i]);
  }
};

/* ===== ai.js ===== */
/* =========================================================================
   三國演義：天下歸一  ——  人工智慧層 ai.js
   各勢力的回合：內政、徵兵、武將布署、出征（含對玩家的互動戰）
   ========================================================================= */


var AI = {};

AI.isFrontline = function (fid, cid) {
  var nb = Q.neighbors(cid);
  for (var i = 0; i < nb.length; i++) if (S.cityOwner[nb[i]] !== fid) return true;
  return false;
};

/* 主入口：完成（含對玩家互動戰）後呼叫 doneCb */
AI.takeTurn = function (fid, doneCb) {
  if (!S.factions[fid] || !S.factions[fid].alive) { doneCb(); return; }
  try {
    AI.economy(fid);
    AI.assignGenerals(fid);
  } catch (e) { /* 容錯：經濟階段出錯不致中斷 */ }

  var plan = AI.planAttacks(fid);

  // 先執行 AI 對 AI／中立 的自動戰（同步）
  for (var i = 0; i < plan.autos.length; i++) {
    AI.execAttack(fid, plan.autos[i], null);
    if (S.over) { doneCb(); return; }
  }
  // 再處理唯一一場對玩家的互動戰（最後）
  if (plan.player && AI.attackValid(fid, plan.player)) {
    AI.execAttack(fid, plan.player, function () { doneCb(); });
  } else {
    doneCb();
  }
};

/* ---------------- 經濟 ---------------- */
AI.economy = function (fid) {
  var f = S.factions[fid];
  var cities = Q.citiesOf(fid);
  // 前線城優先
  cities.sort(function (a, b) {
    return (AI.isFrontline(fid, b) ? 1 : 0) - (AI.isFrontline(fid, a) ? 1 : 0);
  });
  for (var i = 0; i < cities.length; i++) {
    if (f.gold < 250) break;
    var cid = cities[i], cs = S.cityState[cid];
    if (cs.pop < 45 && f.gold >= 120) {
      cs.pop = U.clamp(cs.pop + U.irnd(8, 12), 5, 100); f.gold -= 120; continue;
    }
    if (AI.isFrontline(fid, cid)) {
      if (cs.troops < 26000 && f.gold >= 500) {
        var amt = Math.min(9000, 60000 - cs.troops);
        var cost = Math.round(amt * 0.1);
        if (amt >= 1000 && f.gold >= cost) {
          cs.troops += amt; f.gold -= cost;
          cs.pop = U.clamp(cs.pop - Math.round(amt / 2200), 5, 100);
        }
      } else if (cs.def < 72 && f.gold >= 280) {
        cs.def = U.clamp(cs.def + U.irnd(4, 7), 0, 100); f.gold -= 280;
      }
    } else {
      if (cs.com < 80 && f.gold >= 300) { cs.com = U.clamp(cs.com + U.irnd(4, 7), 0, 100); f.gold -= 300; }
      else if (cs.agr < 85 && f.gold >= 300) { cs.agr = U.clamp(cs.agr + U.irnd(4, 7), 0, 100); f.gold -= 300; }
      else if (cs.troops < 16000 && f.gold >= 500) {
        var a2 = Math.min(6000, 60000 - cs.troops);
        var c2 = Math.round(a2 * 0.1);
        if (a2 >= 1000 && f.gold >= c2) { cs.troops += a2; f.gold -= c2; }
      }
    }
  }
  if (U.chance(0.5)) AI.tryRecruitWild(fid);
};

AI.tryRecruitWild = function (fid) {
  var cities = Q.citiesOf(fid);
  var reach = {};
  for (var i = 0; i < cities.length; i++) {
    reach[cities[i]] = true;
    var nb = Q.neighbors(cities[i]);
    for (var j = 0; j < nb.length; j++) reach[nb[j]] = true;
  }
  for (var k = 0; k < S.wildPool.length; k++) {
    var w = S.wildPool[k];
    if (S.generals[w.id].status !== "wild") continue;
    if (S.turn < w.minTurn) continue;
    if (!reach[w.near]) continue;
    var leaderCha = GEN[S.factions[fid].leaderId].s[ST_CHA];
    var g = GEN[w.id];
    var ch = U.clamp(0.30 + (leaderCha - 60) / 220 - (g.s[ST_CHA] - 70) / 340, 0.12, 0.75);
    if (U.chance(ch)) {
      var dest = (S.cityOwner[w.near] === fid) ? w.near : U.pick(cities);
      S.generals[w.id] = { loc: dest, faction: fid, status: "normal", injuredTurns: 0 };
      S.wildPool.splice(k, 1);
      ENGINE.pushLog("「" + S.factions[fid].name + "」延攬了 " + g.n + "。", "info");
    }
    return; // 一回合最多嘗試一名
  }
};

/* ---------------- 武將布署 ---------------- */
AI.assignGenerals = function (fid) {
  var cities = Q.citiesOf(fid);
  // 找出無將的前線城，從內地調將支援
  for (var i = 0; i < cities.length; i++) {
    var cid = cities[i];
    if (!AI.isFrontline(fid, cid)) continue;
    if (Q.generalsIn(cid).length > 0) continue;
    // 從某內地城（將數>1）調一名過來
    for (var j = 0; j < cities.length; j++) {
      var src = cities[j];
      if (src === cid) continue;
      var gl = Q.generalsIn(src);
      if (gl.length > 1 || (gl.length === 1 && !AI.isFrontline(fid, src))) {
        var mv = gl[gl.length - 1];
        // 不調走君主
        if (S.factions[fid].leaderId === mv && gl.length === 1) continue;
        S.generals[mv].loc = cid;
        break;
      }
    }
  }
};

/* ---------------- 出征規劃 ---------------- */
AI.attackValid = function (fid, atk) {
  if (S.cityOwner[atk.from] !== fid) return false;
  if (S.cityOwner[atk.to] === fid) return false;
  var owner = S.cityOwner[atk.to];
  if (owner && Q.ceasefireLeft(fid, owner) > 0) return false;
  if (S.cityState[atk.from].troops - 500 < 1500) return false;
  return true;
};

AI.attStr = function (cid, troops) {
  var gen = Q.bestGeneralIn(cid, true) || Q.bestGeneralIn(cid, false);
  var lead = gen ? GEN[gen].s[ST_LEAD] : 60;
  return troops * (1 + lead * 0.004);
};
AI.defStr = function (cid) {
  var cs = S.cityState[cid];
  var gen = Q.bestGeneralIn(cid, false);
  var lead = gen ? GEN[gen].s[ST_LEAD] : 55;
  return cs.troops * (1 + cs.def * 0.006) * (1 + lead * 0.004);
};

AI.planAttacks = function (fid) {
  var cities = Q.citiesOf(fid);
  var cand = [];
  for (var i = 0; i < cities.length; i++) {
    var from = cities[i];
    var avail = S.cityState[from].troops - 500;
    if (avail < 1500) continue;
    var aStr = AI.attStr(from, avail);
    var nb = Q.neighbors(from);
    for (var j = 0; j < nb.length; j++) {
      var to = nb[j];
      if (S.cityOwner[to] === fid) continue;
      var owner = S.cityOwner[to];
      if (owner && Q.ceasefireLeft(fid, owner) > 0) continue;
      var dStr = AI.defStr(to);
      var margin = aStr / (dStr + 1);
      var neutral = (owner === null);
      var threshold = neutral ? 1.0 : 1.18;
      // 困難 / 普通開局者：諸侯起兵較為審慎，且開局數回合內按兵不犯，留其喘息生聚
      if (owner === S.playerFaction && S.playerDiff > 0) {
        threshold += S.playerDiff * 0.22;                     // 困難 +0.44、普通 +0.22
        var grace = 3 + S.playerDiff * 2;                     // 困難 7 回合、普通 5 回合
        if (S.turn <= grace) threshold += 0.7;
      }
      if (margin >= threshold) {
        cand.push({ from: from, to: to, margin: margin, player: (owner === S.playerFaction), neutral: neutral });
      }
    }
  }
  cand.sort(function (a, b) { return b.margin - a.margin; });

  var autos = [], player = null, usedFrom = {}, usedTo = {};
  for (var k = 0; k < cand.length; k++) {
    var c = cand[k];
    if (usedFrom[c.from] || usedTo[c.to]) continue;
    if (c.player) {
      if (!player) { player = c; usedFrom[c.from] = 1; usedTo[c.to] = 1; }
    } else if (autos.length < 2) {
      autos.push(c); usedFrom[c.from] = 1; usedTo[c.to] = 1;
    }
  }
  return { autos: autos, player: player };
};

AI.execAttack = function (fid, atk, onComplete) {
  if (!AI.attackValid(fid, atk)) { if (onComplete) onComplete(); return; }
  var cs = S.cityState[atk.from];
  var avail = cs.troops - 500;
  if (avail < 1500) { if (onComplete) onComplete(); return; }
  var gen = Q.bestGeneralIn(atk.from, true) || Q.bestGeneralIn(atk.from, false);
  cs.troops -= avail;
  var who = S.factions[fid].name;
  ENGINE.pushLog("⚔ 「" + who + "」自 " + Q.cityName(atk.from) + " 興兵 " + U.fmt(avail) + " 攻 " + Q.cityName(atk.to) + "！", "war");

  BATTLE.begin({
    fromCity: atk.from, toCity: atk.to,
    attFid: fid, attGenId: gen, attTroops: avail,
    onComplete: onComplete || function () {}
  });
};

if (typeof module !== "undefined" && module.exports) { module.exports = { AI: AI }; }

/* ===== engine.js ===== */
/* =========================================================================
   三國演義：天下歸一  ——  引擎層 engine.js
   遊戲初始化、回合循環、經濟、事件、行動、勝敗、存讀檔
   ========================================================================= */


var ENGINE = {
  busy: false,           // AI 回合進行中
  SAVE_KEY: "sgyy_save_v1"
};

/* ---------------- 難度 / 平衡 ----------------
   依玩家所選勢力的開局難度給予「天命」加成，使弱小諸侯亦有逐鹿之機。
   tier：易=0（無加成，維持原本體驗）、普通=1（小幅）、困難=2（顯著）。
   所有加成僅作用於「玩家」勢力，AI 之間維持原本平衡，天下依舊勢均力敵。 */
ENGINE.diffTier = function (fid) {
  var f = S.scen && S.scen.f && S.scen.f[fid];
  var d = f ? f.diff : "普通";
  return d === "困難" ? 2 : (d === "易" ? 0 : 1);
};
// 玩家戰力加成倍率（攻守皆適用）
ENGINE.playerEdge = function () {
  var t = S.playerDiff || 0;
  return 1 + t * 0.07;            // 困難 ×1.14、普通 ×1.07
};

/* ---------------- 初始化 ---------------- */
ENGINE.initGame = function (scenKey, playerFid) {
  var scen = SCEN[scenKey];
  S.scenKey = scenKey;
  S.scen = scen;
  S.turn = 1;
  S.season = 0;
  S.playerFaction = playerFid;
  S.factions = {};
  S.cityOwner = {};
  S.cityState = {};
  S.generals = {};
  S.wildPool = [];
  S.log = [];
  S.selectedCity = null;
  S.over = false;
  S.outcome = null;

  // 玩家開局難度（決定各項加成幅度）
  var pTier = ENGINE.diffTier(playerFid);
  S.playerDiff = pTier;

  // 勢力
  var fid;
  for (fid in scen.f) {
    var f = scen.f[fid];
    var isP = (fid === playerFid);
    S.factions[fid] = {
      id: fid, name: f.name, color: f.color, leaderId: f.leader,
      // 困難開局者多得錢糧以應急（招兵買馬、興農安民）
      gold: 1400 + (isP ? pTier * 700 : 0),
      food: 2600 + (isP ? pTier * 900 : 0),
      alive: true,
      isPlayer: isP,
      ceasefire: {},
      trait: Q.gen(f.leader) ? Q.gen(f.leader).s[ST_INT] : 70
    };
  }

  // 城池
  var cid;
  for (cid in CITY) {
    var base = CITY[cid];
    var owner = (scen.own[cid] !== undefined) ? scen.own[cid] : null;
    var troops = scen.troops[cid];
    if (troops === undefined) troops = owner ? 8000 : 2500;
    var isPlayerCity = (owner === playerFid);
    var defBuff = 0, popBuff = 0;
    // 困難開局者的根據地：增兵固守、加築城防、安撫民心，以渡過開局的群狼環伺
    if (isPlayerCity && pTier > 0) {
      troops = Math.round(troops * (1 + pTier * 0.18));
      defBuff = pTier * 5;
      popBuff = pTier * 4;
    }
    S.cityOwner[cid] = owner;
    S.cityState[cid] = {
      troops: troops,
      def: U.clamp(base.def + defBuff, 0, 100),
      com: base.com,
      agr: base.agr,
      pop: U.clamp((owner ? 70 : 55) + popBuff, 5, 100),
      acted: false
    };
  }

  // 武將
  var gid;
  for (gid in GEN) {
    var loc = scen.gov[gid];
    if (loc !== undefined) {
      S.generals[gid] = { loc: loc, faction: S.cityOwner[loc], status: "normal", injuredTurns: 0 };
    } else {
      S.generals[gid] = { loc: null, faction: null, status: "reserve", injuredTurns: 0 };
    }
  }
  // 在野
  for (var i = 0; i < scen.wild.length; i++) {
    var w = scen.wild[i];
    S.wildPool.push({ id: w.id, near: w.near, minTurn: w.minTurn || 1, discovered: false });
    S.generals[w.id] = { loc: null, faction: null, status: "wild", injuredTurns: 0 };
  }

  ENGINE.pushLog("【" + scen.name + "】" + scen.year, "era");
  ENGINE.pushLog("你選擇了「" + S.factions[playerFid].name + "」，霸業就此展開。", "info");

  // 困難 / 普通開局加成提示
  S.difficultyTip = "";
  if (pTier > 0) {
    S.difficultyTip = (pTier === 2 ? "困難" : "普通") +
      "開局：天命相助——錢糧充裕、募兵省金、賦稅加增、將士用命、群雄起兵亦較寬容。";
    ENGINE.pushLog("⚖ " + (pTier === 2 ? "勢單力薄，天意眷之" : "民心可用") +
      "：" + S.difficultyTip, "good");
  }
};

/* ---------------- 紀錄 ---------------- */
ENGINE.pushLog = function (text, type) {
  S.log.push({ turn: S.turn, text: text, type: type || "info" });
  if (S.log.length > 200) S.log.shift();
  if (typeof UI !== "undefined" && UI.refreshLog) UI.refreshLog();
};

/* ---------------- 經濟 ---------------- */
ENGINE.income = function (fid) {
  var cities = Q.citiesOf(fid);
  var gold = 0, food = 0, i, cs;
  for (i = 0; i < cities.length; i++) {
    cs = S.cityState[cities[i]];
    gold += Math.round(cs.com * 6 * cs.pop / 100) + 30;
    food += Math.round(cs.agr * 8 * cs.pop / 100);
  }
  // 困難 / 普通開局者賦稅、屯田加增
  if (fid === S.playerFaction && S.playerDiff > 0) {
    var im = 1 + S.playerDiff * 0.18;     // 困難 ×1.36、普通 ×1.18
    gold = Math.round(gold * im);
    food = Math.round(food * im);
  }
  var upkeep = Math.round(Q.totalTroops(fid) * 0.05);
  var f = S.factions[fid];
  f.gold += gold;
  f.food += (food - upkeep);
  var deficit = false;
  if (f.food < 0) {
    deficit = true;
    f.food = 0;
    // 缺糧 → 各城逃兵
    for (i = 0; i < cities.length; i++) {
      cs = S.cityState[cities[i]];
      var lose = Math.round(cs.troops * 0.08);
      cs.troops = Math.max(0, cs.troops - lose);
      cs.pop = U.clamp(cs.pop - 2, 5, 100);
    }
  }
  return { gold: gold, food: food, upkeep: upkeep, deficit: deficit };
};

/* ---------------- 回合：玩家 ---------------- */
ENGINE.startPlayerTurn = function () {
  // 季節事件已於 advanceTurn 處理
  var cities = Q.citiesOf(S.playerFaction);
  var i;
  for (i = 0; i < cities.length; i++) S.cityState[cities[i]].acted = false;
  // 負傷武將回復
  ENGINE.tickInjuries(S.playerFaction);
  var inc = ENGINE.income(S.playerFaction);
  if (inc.deficit) ENGINE.pushLog("⚠ 糧草不繼，士卒逃散！速修農桑。", "warn");
  ENGINE.checkVictory();
  if (S.over) return;
  if (typeof UI !== "undefined") { UI.refreshAll(); }
  if (typeof MAP !== "undefined") MAP.draw();
};

ENGINE.tickInjuries = function (fid) {
  var gid;
  for (gid in S.generals) {
    var g = S.generals[gid];
    if (g.faction === fid && g.status === "injured") {
      g.injuredTurns--;
      if (g.injuredTurns <= 0) { g.status = "normal"; }
    }
  }
};

ENGINE.endPlayerTurn = function () {
  if (ENGINE.busy || S.over) return;
  ENGINE.busy = true;
  if (typeof UI !== "undefined") UI.closeCity();
  // 建立 AI 佇列（玩家以外的存活勢力，依國力由弱到強或隨機）
  var q = [], fid;
  for (fid in S.factions) {
    if (fid !== S.playerFaction && S.factions[fid].alive) q.push(fid);
  }
  S.aiQueue = q;
  if (typeof UI !== "undefined") UI.setPhase("敵軍行動中…");
  setTimeout(ENGINE.processNextAI, 350);
};

ENGINE.processNextAI = function () {
  if (S.over) { ENGINE.busy = false; if (typeof UI !== "undefined" && UI.showEnd) UI.showEnd(); return; }
  if (!S.aiQueue || S.aiQueue.length === 0) {
    ENGINE.advanceTurn();
    return;
  }
  var fid = S.aiQueue.shift();
  if (!S.factions[fid] || !S.factions[fid].alive) { ENGINE.processNextAI(); return; }
  ENGINE.tickInjuries(fid);
  ENGINE.income(fid);
  // AI 行動；完成（含任何對玩家的互動戰）後回呼
  AI.takeTurn(fid, function () {
    ENGINE.checkVictory();
    if (S.over) { ENGINE.busy = false; return; }
    if (typeof MAP !== "undefined") MAP.draw();
    setTimeout(ENGINE.processNextAI, 120);
  });
};

ENGINE.advanceTurn = function () {
  S.turn++;
  S.season = (S.turn - 1) % 4;
  ENGINE.randomEvents();
  ENGINE.decayCeasefire();
  ENGINE.busy = false;
  ENGINE.checkVictory();
  if (S.over) return;
  if (typeof UI !== "undefined") UI.setPhase(null);
  ENGINE.startPlayerTurn();
};

ENGINE.decayCeasefire = function () {
  var fid, k;
  for (fid in S.factions) {
    var cf = S.factions[fid].ceasefire;
    for (k in cf) { cf[k]--; if (cf[k] <= 0) delete cf[k]; }
  }
};

/* ---------------- 事件 ---------------- */
ENGINE.randomEvents = function () {
  if (S.turn < 2) return;
  // 玩家事件（讓玩家看得到）
  ENGINE.factionEvent(S.playerFaction, true);
  // 隨機一個 AI 事件
  var alive = [];
  for (var fid in S.factions) if (fid !== S.playerFaction && S.factions[fid].alive) alive.push(fid);
  if (alive.length && U.chance(0.5)) ENGINE.factionEvent(U.pick(alive), false);
};

ENGINE.factionEvent = function (fid, visible) {
  if (!U.chance(0.45)) return;
  var cities = Q.citiesOf(fid);
  if (!cities.length) return;
  var cid = U.pick(cities);
  var cs = S.cityState[cid];
  var roll = U.irnd(1, 100);
  var nm = S.factions[fid].name, cn = Q.cityName(cid);
  if (roll <= 28) {
    // 豐收
    cs.pop = U.clamp(cs.pop + 10, 5, 100);
    S.factions[fid].food += 500;
    if (visible) ENGINE.pushLog("🌾 " + cn + "五穀豐登，民心大悅。", "good");
  } else if (roll <= 48) {
    // 商隊
    S.factions[fid].gold += 400;
    if (visible) ENGINE.pushLog("💰 商旅雲集 " + cn + "，國庫充盈（金 +400）。", "good");
  } else if (roll <= 66) {
    // 水患
    var l1 = Math.round(cs.troops * 0.05);
    cs.troops = Math.max(0, cs.troops - l1);
    cs.pop = U.clamp(cs.pop - 9, 5, 100);
    if (visible) ENGINE.pushLog("🌊 " + cn + "大水，房舍漂沒，士卒折損。", "bad");
  } else if (roll <= 82) {
    // 疫病
    var l2 = Math.round(cs.troops * 0.07);
    cs.troops = Math.max(0, cs.troops - l2);
    cs.pop = U.clamp(cs.pop - 7, 5, 100);
    if (visible) ENGINE.pushLog("☠ " + cn + "疫病流行，軍民染疾。", "bad");
  } else if (roll <= 92) {
    // 民變（低民心才嚴重）
    if (cs.pop < 45) {
      var l3 = Math.round(cs.troops * 0.10);
      cs.troops = Math.max(0, cs.troops - l3);
      cs.pop = U.clamp(cs.pop + 6, 5, 100);
      if (visible) ENGINE.pushLog("🔥 " + cn + "民心思亂，爆發民變！", "bad");
    } else if (visible) {
      ENGINE.pushLog("✦ " + cn + "政通人和，四方歸心。", "good");
      cs.pop = U.clamp(cs.pop + 3, 5, 100);
    }
  } else {
    // 良駒 / 軍械
    S.factions[fid].gold += 200;
    if (visible) ENGINE.pushLog("🐎 " + cn + "得良駒軍械，士氣大振。", "good");
  }
};

/* ---------------- 行動 ---------------- */
ENGINE.canAct = function (cid) {
  return S.cityOwner[cid] === S.playerFaction && !S.cityState[cid].acted && !S.over && !ENGINE.busy;
};

ENGINE.spend = function (gold) {
  var f = S.factions[S.playerFaction];
  if (f.gold < gold) return false;
  f.gold -= gold; return true;
};

ENGINE.actDevelop = function (cid, type) {
  if (!ENGINE.canAct(cid)) return false;
  var cost = type === "def" ? 280 : 300;
  if (!ENGINE.spend(cost)) { ENGINE.toast("金不足"); return false; }
  var cs = S.cityState[cid];
  var inc = U.irnd(4, 7);
  if (type === "com") { cs.com = U.clamp(cs.com + inc, 0, 100); }
  else if (type === "agr") { cs.agr = U.clamp(cs.agr + inc, 0, 100); }
  else { cs.def = U.clamp(cs.def + inc, 0, 100); }
  cs.acted = true;
  AUD.play("build");
  var label = type === "com" ? "商業" : (type === "agr" ? "農業" : "城防");
  ENGINE.pushLog(Q.cityName(cid) + " 興" + label + "，+" + inc + "。", "info");
  ENGINE.afterAction(cid);
  return true;
};

ENGINE.actGovern = function (cid) {
  if (!ENGINE.canAct(cid)) return false;
  if (!ENGINE.spend(120)) { ENGINE.toast("金不足"); return false; }
  var cs = S.cityState[cid];
  var inc = U.irnd(8, 13);
  cs.pop = U.clamp(cs.pop + inc, 0, 100);
  cs.acted = true;
  AUD.play("build");
  ENGINE.pushLog(Q.cityName(cid) + " 開倉安民，民心 +" + inc + "。", "info");
  ENGINE.afterAction(cid);
  return true;
};

ENGINE.actRecruit = function (cid, amount) {
  if (!ENGINE.canAct(cid)) return false;
  var cs = S.cityState[cid];
  amount = Math.round(amount);
  var cap = 60000 - cs.troops;
  if (amount > cap) amount = cap;
  if (amount < 500) { ENGINE.toast("兵額不足"); return false; }
  // 困難 / 普通開局者募兵省金
  var costRate = 0.1 * (1 - (S.playerDiff || 0) * 0.13);   // 困難 ≈0.074、普通 ≈0.087
  var cost = Math.round(amount * costRate);
  if (!ENGINE.spend(cost)) { ENGINE.toast("金不足"); return false; }
  cs.troops += amount;
  cs.pop = U.clamp(cs.pop - Math.round(amount / 2200), 5, 100);
  cs.acted = true;
  AUD.play("coin");
  ENGINE.pushLog(Q.cityName(cid) + " 募兵 " + U.fmt(amount) + "（費金 " + cost + "）。", "info");
  ENGINE.afterAction(cid);
  return true;
};

ENGINE.actSearch = function (cid) {
  if (!ENGINE.canAct(cid)) return false;
  if (!ENGINE.spend(200)) { ENGINE.toast("金不足"); return false; }
  S.cityState[cid].acted = true;
  AUD.play("build");
  // 找附近在野（此城或相鄰）且已達登場回合
  var near = [cid].concat(Q.neighbors(cid));
  var found = null, i;
  for (i = 0; i < S.wildPool.length; i++) {
    var w = S.wildPool[i];
    if (S.generals[w.id].status !== "wild") continue;
    if (S.turn < w.minTurn) continue;
    if (near.indexOf(w.near) >= 0) { found = w; break; }
  }
  if (!found) {
    ENGINE.pushLog(Q.cityName(cid) + " 遍訪賢才，惜未得其人。", "info");
    ENGINE.afterAction(cid);
    return true;
  }
  var g = GEN[found.id];
  var leaderCha = GEN[S.factions[S.playerFaction].leaderId].s[ST_CHA];
  var ch = U.clamp(0.42 + (leaderCha - 55) / 200 - (g.s[ST_CHA] - 70) / 320, 0.18, 0.9);
  if (U.chance(ch)) {
    S.generals[found.id] = { loc: cid, faction: S.playerFaction, status: "normal", injuredTurns: 0 };
    // 移出在野池
    for (i = 0; i < S.wildPool.length; i++) if (S.wildPool[i].id === found.id) { S.wildPool.splice(i, 1); break; }
    AUD.play("recruit");
    ENGINE.pushLog("★ 訪得賢才 " + g.n + "，納入麾下！", "recruit");
  } else {
    found.discovered = true;
    ENGINE.pushLog("尋得隱士 " + g.n + " 的下落，然其尚在觀望……（可再訪）", "info");
  }
  ENGINE.afterAction(cid);
  return true;
};

/* 自由調動武將（同勢力城池間，不耗行動） */
ENGINE.moveGeneral = function (gid, toCid) {
  var g = S.generals[gid];
  if (!g || g.faction !== S.playerFaction) return false;
  if (S.cityOwner[toCid] !== S.playerFaction) return false;
  g.loc = toCid;
  AUD.play("click");
  return true;
};

/* 出征 */
ENGINE.actMarch = function (fromCid, toCid, genId, troops) {
  if (!ENGINE.canAct(fromCid)) return false;
  if (!Q.isAdj(fromCid, toCid)) { ENGINE.toast("並不相鄰"); return false; }
  var targetOwner = S.cityOwner[toCid];
  if (targetOwner === S.playerFaction) { ENGINE.toast("乃我方城池"); return false; }
  if (targetOwner && Q.ceasefireLeft(S.playerFaction, targetOwner) > 0) { ENGINE.toast("停戰盟約未滿"); return false; }
  var cs = S.cityState[fromCid];
  troops = Math.round(troops);
  if (troops > cs.troops - 500) troops = cs.troops - 500;   // 至少留 500 守城
  if (troops < 1000) { ENGINE.toast("出征兵力過少"); return false; }
  if (genId && (S.generals[genId].loc !== fromCid || S.generals[genId].status === "injured")) genId = null;

  cs.troops -= troops;
  cs.acted = true;
  ENGINE.pushLog("⚔ 自 " + Q.cityName(fromCid) + " 發兵 " + U.fmt(troops) + " 攻 " + Q.cityName(toCid) + "！", "war");
  if (typeof UI !== "undefined") UI.closeCity();

  BATTLE.begin({
    fromCity: fromCid, toCity: toCid,
    attFid: S.playerFaction, attGenId: genId, attTroops: troops,
    onComplete: function () {
      ENGINE.afterAction(toCid, true);
    }
  });
  return true;
};

ENGINE.afterAction = function (cid, fromBattle) {
  ENGINE.checkVictory();
  if (S.over) { if (typeof UI !== "undefined") UI.showEnd(); return; }
  if (typeof UI !== "undefined") {
    UI.refreshAll();
    if (!fromBattle && S.selectedCity) UI.openCity(S.selectedCity);
  }
  if (typeof MAP !== "undefined") MAP.draw();
};

ENGINE.toast = function (msg) { if (typeof UI !== "undefined" && UI.toast) UI.toast(msg); };

/* ---------------- 外交：停戰 ---------------- */
ENGINE.requestCeasefire = function (targetFid) {
  if (!targetFid || !S.factions[targetFid] || !S.factions[targetFid].alive) return;
  var me = Q.factionStrength(S.playerFaction), them = Q.factionStrength(targetFid);
  // 對方越弱越不願；越強越願意（怕你壯大則否）。以實力比與隨機決定
  var ratio = me / (them + 1);
  var accept = U.chance(U.clamp(0.25 + (ratio - 1) * 0.35, 0.1, 0.85));
  if (accept) {
    var turns = U.irnd(4, 7);
    S.factions[S.playerFaction].ceasefire[targetFid] = turns;
    S.factions[targetFid].ceasefire[S.playerFaction] = turns;
    AUD.play("coin");
    ENGINE.pushLog("🕊 與「" + S.factions[targetFid].name + "」締結停戰 " + turns + " 季。", "good");
  } else {
    ENGINE.pushLog("「" + S.factions[targetFid].name + "」斷然回絕了停戰之議。", "bad");
  }
  if (typeof UI !== "undefined") UI.refreshAll();
};

/* ---------------- 勢力存亡 / 勝敗 ---------------- */
ENGINE.checkFactionAlive = function (fid) {
  if (!fid || !S.factions[fid]) return;
  if (!S.factions[fid].alive) return;
  if (Q.citiesOf(fid).length === 0) {
    S.factions[fid].alive = false;
    // 滅亡：未被俘的在籍武將四散為在野
    var gid;
    for (gid in S.generals) {
      var g = S.generals[gid];
      if (g.faction === fid && (g.status === "normal" || g.status === "injured")) {
        var leaderGone = (S.factions[fid].leaderId === gid);
        if (leaderGone) { g.faction = null; g.loc = null; g.status = "dead"; }
        else { g.faction = null; g.status = "wild"; if (g.loc) BATTLE._makeWild(gid, g.loc); g.loc = null; }
      }
    }
    ENGINE.pushLog("✸ 「" + S.factions[fid].name + "」就此覆滅！", "result");
  }
};

ENGINE.checkVictory = function () {
  if (S.over) return;
  // 敗：玩家無城
  if (Q.citiesOf(S.playerFaction).length === 0) {
    ENGINE.declareOver("lose", "基業盡失，霸圖成空……");
    return;
  }
  // 勝：天下所有城池盡歸玩家
  var cid, all = true;
  for (cid in S.cityOwner) { if (S.cityOwner[cid] !== S.playerFaction) { all = false; break; } }
  if (all) { ENGINE.declareOver("win", "天下一統！霸業已成！"); return; }
  // 勝：唯餘玩家一勢力存活（其餘為中立空城亦算未竟，需上面全據）
  var aliveCount = 0, fid;
  for (fid in S.factions) if (S.factions[fid].alive) aliveCount++;
  if (aliveCount === 1 && S.factions[S.playerFaction].alive) {
    var anyNeutral = false;
    for (cid in S.cityOwner) if (S.cityOwner[cid] === null) anyNeutral = true;
    if (!anyNeutral) { ENGINE.declareOver("win", "群雄殄滅，天下歸一！"); }
  }
};

ENGINE.declareOver = function (outcome, msg) {
  if (S.over) return;
  S.over = true; S.outcome = outcome;
  ENGINE.pushLog(msg, "result");
  if (typeof UI !== "undefined" && UI.showEnd) UI.showEnd();
};

/* ---------------- 存讀檔（localStorage，包 try/catch） ---------------- */
ENGINE.snapshot = function () {
  return JSON.stringify({
    v: 1, scenKey: S.scenKey, turn: S.turn, season: S.season,
    playerFaction: S.playerFaction, playerDiff: S.playerDiff, factions: S.factions,
    cityOwner: S.cityOwner, cityState: S.cityState,
    generals: S.generals, wildPool: S.wildPool, log: S.log
  });
};
ENGINE.save = function () {
  try {
    localStorage.setItem(ENGINE.SAVE_KEY, ENGINE.snapshot());
    ENGINE.pushLog("已存檔。", "info");
    ENGINE.toast("已存檔");
    return true;
  } catch (e) {
    ENGINE.toast("此環境無法存檔");
    return false;
  }
};
ENGINE.hasSave = function () {
  try { return !!localStorage.getItem(ENGINE.SAVE_KEY); } catch (e) { return false; }
};
ENGINE.load = function () {
  try {
    var raw = localStorage.getItem(ENGINE.SAVE_KEY);
    if (!raw) return false;
    var d = JSON.parse(raw);
    S.scenKey = d.scenKey; S.scen = SCEN[d.scenKey];
    S.turn = d.turn; S.season = d.season;
    S.playerFaction = d.playerFaction;
    // 還原玩家難度加成（舊存檔則依勢力難度推算）
    S.playerDiff = (typeof d.playerDiff === "number") ? d.playerDiff : ENGINE.diffTier(d.playerFaction);
    S.factions = d.factions; S.cityOwner = d.cityOwner;
    S.cityState = d.cityState; S.generals = d.generals;
    S.wildPool = d.wildPool; S.log = d.log || [];
    S.selectedCity = null; S.over = false; S.outcome = null;
    ENGINE.busy = false;
    return true;
  } catch (e) { return false; }
};

if (typeof module !== "undefined" && module.exports) { module.exports = { ENGINE: ENGINE }; }

/* ===== boot.js ===== */
/* =========================================================================
   三國演義：天下歸一  ——  啟動層 boot.js
   標題畫面、劇本與勢力選擇、開局／讀檔、回到主選單
   ========================================================================= */


var BOOT = { _mapReady: false, _pick: { scen: null } };

BOOT.el = function (id) { return document.getElementById(id); };

/* 進入點 */
window.addEventListener("load", function () {
  // 任一手勢恢復音訊（行動裝置）
  function unlock() { try { AUD.init(); AUD.resume(); } catch (e) {} }
  window.addEventListener("pointerdown", unlock, { once: true });
  BOOT.toTitle();
});

/* ---------------- 主選單 ---------------- */
BOOT.toTitle = function () {
  try { AUD.stopMusic(); } catch (e) {}
  BOOT.showTitle();
  BOOT.renderTitle();
};

BOOT.showTitle = function () {
  BOOT.el("titleScreen").classList.remove("hidden");
};
BOOT.hideTitle = function () {
  BOOT.el("titleScreen").classList.add("hidden");
};

BOOT.renderTitle = function () {
  var hasSave = ENGINE.hasSave();
  var html =
    '<div class="title-wrap">' +
      '<div class="title-banner">' +
        '<div class="title-main">三國演義</div>' +
        '<div class="title-sub">天下歸一</div>' +
        '<div class="title-tag">群雄逐鹿 · 問鼎中原</div>' +
      '</div>' +
      '<div class="title-menu">' +
        '<button class="title-b primary" id="tNew">新的征途</button>' +
        (hasSave ? '<button class="title-b" id="tCont">繼續前緣</button>' : '') +
        '<button class="title-b ghost" id="tHelp">遊戲說明</button>' +
      '</div>' +
      '<div class="title-foot">單機網頁版 · 以 Canvas 與 Web Audio 純程式生成</div>' +
    '</div>';
  BOOT.el("titleScreen").innerHTML = html;
  BOOT.el("tNew").onclick = function () { AUD.play("click"); BOOT.renderScenario(); };
  if (hasSave) BOOT.el("tCont").onclick = function () { AUD.play("click"); BOOT.continueGame(); };
  BOOT.el("tHelp").onclick = function () { AUD.play("click"); BOOT.renderHelp(); };
};

BOOT.renderHelp = function () {
  var html =
    '<div class="title-wrap narrow">' +
      '<div class="help-title">遊戲說明</div>' +
      '<div class="help-body">' +
        '<p><b>目標</b>：統一天下所有城池，成就霸業。</p>' +
        '<p><b>地圖</b>：單指拖曳平移、雙指或滾輪縮放，點選城池開啟操作面板。</p>' +
        '<p><b>時序</b>：一回合為一季，春夏秋冬四季為一年。</p>' +

        '<p><b>軍事</b>：自我方城池向相鄰敵城／空城「出征」。戰鬥為回合制，可選擇突擊、計略、堅守、單挑、火計，善用地形與名將以寡擊眾。</p>' +

  BOOT.el("titleScreen").innerHTML = html;
  BOOT.el("hBack").onclick = function () { AUD.play("click"); BOOT.renderTitle(); };
};

/* ---------------- 劇本選擇 ---------------- */
BOOT.renderScenario = function () {
  var cards = "";
  var keys = ["s190", "s208"];
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i], s = SCEN[k];
    var nFac = Object.keys(s.f).length;
    cards += '<button class="scen-card" data-s="' + k + '">' +
      '<div class="scen-name">' + s.name + '</div>' +
      '<div class="scen-year">' + s.year + '</div>' +
      '<div class="scen-intro">' + s.intro + '</div>' +
      '<div class="scen-meta">可選勢力 ' + nFac + ' 家</div>' +
      '</button>';
  }
  var html =
    '<div class="title-wrap">' +
      '<div class="pick-head"><button class="pick-back" id="sBack">‹ 返回</button><span>選擇劇本</span></div>' +
      '<div class="scen-list">' + cards + '</div>' +
    '</div>';
  BOOT.el("titleScreen").innerHTML = html;
  BOOT.el("sBack").onclick = function () { AUD.play("click"); BOOT.renderTitle(); };
  var cs = BOOT.el("titleScreen").querySelectorAll(".scen-card");
  for (var j = 0; j < cs.length; j++) {
    (function (b) {
      b.onclick = function () { AUD.play("select"); BOOT.renderFactions(b.getAttribute("data-s")); };
    })(cs[j]);
  }
};

/* ---------------- 勢力選擇 ---------------- */
BOOT.renderFactions = function (scenKey) {
  BOOT._pick.scen = scenKey;
  var s = SCEN[scenKey];
  var fids = Object.keys(s.f);
  // 依起始城數排序（強→弱）
  fids.sort(function (a, b) { return BOOT.startCities(s, b) - BOOT.startCities(s, a); });

  var cards = "";
  for (var i = 0; i < fids.length; i++) {
    var fid = fids[i], f = s.f[fid];
    var nc = BOOT.startCities(s, fid);
    var ng = BOOT.startGens(s, fid);
    var leader = GEN[f.leader];
    var port = leader ? PORTRAIT.toDataURL(leader, 64, f.color) : "";
    var aid = (f.diff === "困難") ? " · 天命加成★★" : (f.diff === "普通" ? " · 天命加成★" : "");
    cards += '<button class="fac-card" data-f="' + fid + '" style="--fc:' + f.color + '">' +
      '<img class="fac-port" src="' + port + '">' +
      '<div class="fac-name">' + f.name + '</div>' +
      '<div class="fac-leader">君主 ' + (leader ? leader.n : "—") + '</div>' +
      '<div class="fac-diff">難度 ' + f.diff + aid + '</div>' +
      '<div class="fac-meta">城 ' + nc + ' · 將 ' + ng + '</div>' +
      '<div class="fac-desc">' + f.desc + '</div>' +
      '</button>';
  }
  var html =
    '<div class="title-wrap wide">' +
      '<div class="pick-head"><button class="pick-back" id="fBack">‹ 返回</button><span>' + s.name + ' — 選擇勢力</span></div>' +
      '<div class="fac-grid">' + cards + '</div>' +
    '</div>';
  BOOT.el("titleScreen").innerHTML = html;
  BOOT.el("fBack").onclick = function () { AUD.play("click"); BOOT.renderScenario(); };
  var fc = BOOT.el("titleScreen").querySelectorAll(".fac-card");
  for (var j = 0; j < fc.length; j++) {
    (function (b) {
      b.onclick = function () {
        AUD.play("gong");
        try { AUD.init(); AUD.resume(); } catch (e) {}
        BOOT.startGame(scenKey, b.getAttribute("data-f"));
      };
    })(fc[j]);
  }
};

BOOT.startCities = function (s, fid) {
  var n = 0, c;
  for (c in s.own) if (s.own[c] === fid) n++;
  return n;
};
BOOT.startGens = function (s, fid) {
  var n = 0, g;
  for (g in s.gov) if (s.own[s.gov[g]] === fid) n++;
  return n;
};

/* ---------------- 開局 ---------------- */
BOOT.startGame = function (scenKey, fid) {
  ENGINE.initGame(scenKey, fid);
  BOOT.enterGame();
  ENGINE.startPlayerTurn();
};

BOOT.continueGame = function () {
  if (!ENGINE.load()) { alert("讀檔失敗。"); return; }
  BOOT.enterGame();
  if (typeof UI !== "undefined") UI.refreshAll();
  if (typeof MAP !== "undefined") MAP.draw();
};

BOOT.enterGame = function () {
  BOOT.hideTitle();
  var canvas = BOOT.el("map");
  if (!BOOT._mapReady) {
    MAP.init(canvas);
    BOOT._mapReady = true;
  } else {
    MAP.resize(); MAP.fit();
  }
  UI.init();
  MAP.fit();
  MAP.draw();
  try { AUD.startMusic("field"); } catch (e) {}
};

if (typeof module !== "undefined" && module.exports) { module.exports = { BOOT: BOOT }; }

</script>
</body>
</html>
